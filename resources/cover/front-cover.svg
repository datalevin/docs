<svg xmlns="http://www.w3.org/2000/svg" width="7in" height="9.25in" viewBox="0 0 2100 2775" role="img" aria-labelledby="title desc">
  <title id="title">Front cover for Datalevin: The Definitive Guide to Logical and Intelligent Databases</title>
  <desc id="desc">A bold dark front cover at 7 by 9.25 inch trim. A glowing central Datalevin hexagon logo is the hub of a radial diagram, with six paradigms (Datalog, Graph, Search, Documents, Key-Value, AI Memory) orbiting it. Title, subtitle, author Huahai Yang, and imprint Calero Creek Press.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2942"/>
      <stop offset="0.55" stop-color="#0a1c30"/>
      <stop offset="1" stop-color="#06101c"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2bc6a0" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#1f9e7e" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1f9e7e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7ad9b9" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#3fb79a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3fb79a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f7cba"/>
      <stop offset="1" stop-color="#234a78"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9f3da"/>
      <stop offset="1" stop-color="#69d4b2"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <style>
      .cream { fill: #f4f6f2; }
      .mint  { fill: #7ad9b9; }
      .title { font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 204px; font-weight: 800; letter-spacing: -2px; }
      .subtitle { fill: #d7e1ea; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 60px; font-weight: 600; }
      .kicker { fill: #7ad9b9; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 29px; font-weight: 760; letter-spacing: 7px; }
      .node   { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 720; }
      .nodesub{ fill: #8aa0b3; font-family: IBM Plex Mono, Menlo, Consolas, monospace; font-size: 23px; font-weight: 500; }
      .author { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 56px; font-weight: 700; }
      .imprint{ fill: #d7c16f; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 680; letter-spacing: 5px; }
      .orbit { fill: none; stroke: #38566e; stroke-width: 2.5; stroke-dasharray: 3 16; stroke-linecap: round; opacity: 0.6; }
      .hexring { fill: none; stroke: #9bead0; stroke-width: 5; opacity: 0.95; }
    </style>
  </defs>

  <rect x="0" y="0" width="2100" height="2775" fill="url(#bg)"/>
  <rect class="mint" x="0" y="0" width="2100" height="10"/>

  <!-- Masthead -->
  <text class="kicker" x="1050" y="296" text-anchor="middle">DATABASES · DATALOG · AGENT MEMORY</text>
  <text class="title" x="1050" y="540" text-anchor="middle"><tspan fill="#f4f6f2">Data</tspan><tspan fill="#7ad9b9">levin</tspan></text>
  <text class="subtitle" x="1050" y="648" text-anchor="middle">The Definitive Guide to</text>
  <text class="subtitle" x="1050" y="724" text-anchor="middle">Logical and Intelligent Databases</text>
  <rect class="mint" x="910" y="772" width="280" height="6" rx="3"/>

  <!-- Glow stack -->
  <circle cx="1050" cy="1600" r="780" fill="url(#halo)"/>
  <circle cx="1050" cy="1600" r="470" fill="url(#coreGlow)"/>
  <circle cx="1050" cy="1600" r="232" fill="#7ad9b9" opacity="0.55" filter="url(#soft)"/>

  <!-- Orbit -->
  <circle class="orbit" cx="1050" cy="1600" r="560"/>

  <!-- Spokes (hex vertex -> ring node) -->
  <path d="M1050 1400 L1050 1040" stroke="#5b9bd5" stroke-width="3.5" opacity="0.7"/>
  <path d="M1223 1500 L1535 1320" stroke="#74d6b6" stroke-width="3.5" opacity="0.7"/>
  <path d="M1223 1700 L1535 1880" stroke="#34b3a0" stroke-width="3.5" opacity="0.7"/>
  <path d="M1050 1800 L1050 2160" stroke="#d28a62" stroke-width="3.5" opacity="0.7"/>
  <path d="M877 1700 L565 1880"  stroke="#7fb8e0" stroke-width="3.5" opacity="0.7"/>
  <path d="M877 1500 L565 1320"  stroke="#46c0a8" stroke-width="3.5" opacity="0.7"/>

  <!-- Ring nodes -->
  <!-- Datalog (top) -->
  <circle cx="1050" cy="1040" r="26" fill="none" stroke="#5b9bd5" stroke-width="3" opacity="0.5"/>
  <circle cx="1050" cy="1040" r="14" fill="#5b9bd5"/>
  <text class="node" x="1050" y="984" text-anchor="middle">Datalog</text>
  <text class="nodesub" x="1050" y="1016" text-anchor="middle">logic query</text>

  <!-- Graph (upper right) -->
  <circle cx="1535" cy="1320" r="26" fill="none" stroke="#74d6b6" stroke-width="3" opacity="0.5"/>
  <circle cx="1535" cy="1320" r="14" fill="#74d6b6"/>
  <text class="node" x="1582" y="1312" text-anchor="start">Graph</text>
  <text class="nodesub" x="1582" y="1344" text-anchor="start">refs as edges</text>

  <!-- Search (lower right) -->
  <circle cx="1535" cy="1880" r="26" fill="none" stroke="#34b3a0" stroke-width="3" opacity="0.5"/>
  <circle cx="1535" cy="1880" r="14" fill="#34b3a0"/>
  <text class="node" x="1582" y="1872" text-anchor="start">Search</text>
  <text class="nodesub" x="1582" y="1904" text-anchor="start">text + vector</text>

  <!-- AI Memory (bottom) -->
  <circle cx="1050" cy="2160" r="26" fill="none" stroke="#d28a62" stroke-width="3" opacity="0.5"/>
  <circle cx="1050" cy="2160" r="14" fill="#d28a62"/>
  <text class="node" x="1050" y="2226" text-anchor="middle">AI Memory</text>
  <text class="nodesub" x="1050" y="2258" text-anchor="middle">episodes + facts</text>

  <!-- Key-Value (lower left) -->
  <circle cx="565" cy="1880" r="26" fill="none" stroke="#7fb8e0" stroke-width="3" opacity="0.5"/>
  <circle cx="565" cy="1880" r="14" fill="#7fb8e0"/>
  <text class="node" x="518" y="1872" text-anchor="end">Key-Value</text>
  <text class="nodesub" x="518" y="1904" text-anchor="end">LMDB store</text>

  <!-- Documents (upper left) -->
  <circle cx="565" cy="1320" r="26" fill="none" stroke="#46c0a8" stroke-width="3" opacity="0.5"/>
  <circle cx="565" cy="1320" r="14" fill="#46c0a8"/>
  <text class="node" x="518" y="1312" text-anchor="end">Documents</text>
  <text class="nodesub" x="518" y="1344" text-anchor="end">idoc paths</text>

  <!-- Hub: brighter gradient hex + mint outline + bolt -->
  <polygon fill="url(#hexGrad)" points="1050,1400 1223,1500 1223,1700 1050,1800 877,1700 877,1500"/>
  <polygon class="hexring" points="1050,1388 1233.6,1494 1233.6,1706 1050,1812 866.4,1706 866.4,1494"/>
  <g transform="translate(850 1400)">
    <path fill="url(#boltGrad)" d="M234 52 L118 224 H187 L162 347 L281 176 H210 Z"/>
  </g>

  <!-- Footer -->
  <text class="author" x="1050" y="2438" text-anchor="middle">Huahai Yang</text>
  <rect class="mint" x="910" y="2500" width="280" height="6" rx="3"/>

  <!-- Calero Creek Press owl mark, using the traced wooden owl clock contour -->
  <g transform="translate(1008 2550) scale(0.096)">
    <path fill="#d7c16f" fill-rule="evenodd" d="M 437 0 L 285 22 L 155 70 L 54 148 L 9 223 L 0 312 L 28 424 L 170 601 L 49 900 L 25 1124 L 34 1150 L 76 1149 L 249 1091 L 436 1122 L 470 1172 L 446 1234 L 489 1247 L 524 1227 L 565 1238 L 599 1218 L 703 1215 L 638 1165 L 650 1098 L 767 1042 L 844 945 L 870 776 L 794 539 L 872 390 L 884 265 L 849 140 L 765 60 L 634 12 Z M 74 318 A 205 205 0 1 0 484 318 A 205 205 0 1 0 74 318 Z M 414 318 A 205 205 0 1 0 824 318 A 205 205 0 1 0 414 318 Z M 407 515 C 407 482 463 482 464 516 C 465 550 440 575 436 610 C 429 576 407 550 407 515 Z"/>
    <path fill="#d7c16f" d="M 56 168 L 212 -126 L 392 74 C 266 58 150 100 56 168 Z M 494 74 L 686 -126 L 836 168 C 742 100 620 58 494 74 Z"/>
    <g fill="none" stroke="#d7c16f" stroke-width="28" stroke-linecap="round">
      <path d="M279 236 L279 145 M337 260 L401 196 M361 318 L452 318 M337 376 L401 440 M279 400 L279 491 M221 376 L157 440 M197 318 L106 318 M221 260 L157 196"/>
      <path d="M619 236 L619 145 M677 260 L741 196 M701 318 L792 318 M677 376 L741 440 M619 400 L619 491 M561 376 L497 440 M537 318 L446 318 M561 260 L497 196"/>
    </g>
    <path fill="#d7c16f" fill-rule="evenodd" d="M 229 318 A 50 50 0 1 0 329 318 A 50 50 0 1 0 229 318 Z M 261 318 A 18 18 0 1 1 297 318 A 18 18 0 1 1 261 318 Z M 569 318 A 50 50 0 1 0 669 318 A 50 50 0 1 0 569 318 Z M 601 318 A 18 18 0 1 1 637 318 A 18 18 0 1 1 601 318 Z"/>
  </g>

  <text class="imprint" x="1050" y="2724" text-anchor="middle">CALERO CREEK PRESS</text>
</svg>
