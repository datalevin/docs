      <style>
        .cream { fill: #f4f6f2; }
        .mint  { fill: #7ad9b9; }
        .title { font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 204px; font-weight: 800; letter-spacing: -2px; }
        .subtitle { fill: #d7e1ea; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 60px; font-weight: 600; }
