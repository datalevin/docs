        .node   { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 720; }
        .nodesub{ fill: #8aa0b3; font-family: IBM Plex Mono, Menlo, Consolas, monospace; font-size: 23px; font-weight: 500; }
        .author { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 56px; font-weight: 700; }
        .imprint{ fill: #d7c16f; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 680; letter-spacing: 5px; }
        .orbit { fill: none; stroke: #38566e; stroke-width: 2.5; stroke-dasharray: 3 16; stroke-linecap: round; opacity: 0.6; }
        .hexring { fill: none; stroke: #9bead0; stroke-width: 5; opacity: 0.95; }
      </style>
    </defs>

    <rect x="0" y="-37.5" width="2137.5" height="2850" fill="url(#bg)"/>
    <rect class="mint" x="0" y="-37.5" width="2137.5" height="10"/>

    <text class="kicker" x="1050" y="296" text-anchor="middle">DATABASES · DATALOG · AGENT MEMORY</text>
    <text class="title" x="1050" y="540" text-anchor="middle"><tspan fill="#f4f6f2">Data</tspan><tspan fill="#7ad9b9">levin</tspan></text>
    <text class="subtitle" x="1050" y="648" text-anchor="middle">The Definitive Guide to</text>
    <text class="subtitle" x="1050" y="724" text-anchor="middle">Logical and Intelligent Databases</text>
