<svg xmlns="http://www.w3.org/2000/svg" width="15.2634in" height="9.5in" viewBox="0 0 4579.02 2850" role="img" aria-labelledby="wrap-title wrap-desc">
  <title id="wrap-title">Wraparound cover for Datalevin, 450 pages, KDP white paper</title>
  <desc id="wrap-desc">A full print cover with back cover, 1.0134 inch spine, and front cover for a 7 by 9.25 inch Datalevin book with 0.125 inch bleed.</desc>

  <!--
    Draft production assumptions:
    trim: 7in x 9.25in
    bleed: 0.125in
    page count: 450
    paper: KDP black-and-white white paper
    spine: 450 * 0.002252in = 1.0134in
    full cover: 15.2634in x 9.5in

    Coordinate system uses 300 units per inch.
    bleed = 37.5
    back trim:  x=37.5, width=2100
    spine:      x=2137.5, width=304.02
    front trim: x=2441.52, width=2100
  -->

  <defs>
    <linearGradient id="wrap-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2942"/>
      <stop offset="0.56" stop-color="#0a1c30"/>
      <stop offset="1" stop-color="#06101c"/>
    </linearGradient>
    <radialGradient id="wrap-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2bc6a0" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#1f9e7e" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1f9e7e" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <style>
      .cover-cream { fill: #f4f6f2; }
      .cover-muted { fill: #d7e1ea; }
      .cover-soft { fill: #8aa0b3; }
      .cover-mint { fill: #7ad9b9; }
      .cover-gold { fill: #d7c16f; }
      .cover-title { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 62px; font-weight: 760; }
      .cover-heading { fill: #7ad9b9; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 760; letter-spacing: 5px; }
      .cover-body { fill: #d7e1ea; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 39px; font-weight: 430; }
      .cover-bullet { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 38px; font-weight: 560; }
      .cover-small { fill: #9db0c1; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 430; }
      .cover-rule { fill: #7ad9b9; }
      .spine-title { fill: #f4f6f2; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 116px; font-weight: 800; letter-spacing: -1px; }
      .spine-subtitle { fill: #d7e1ea; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 35px; font-weight: 620; letter-spacing: 1.8px; }
      .spine-author { fill: #d7c16f; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 38px; font-weight: 760; letter-spacing: 2.4px; }
      .spine-imprint { fill: #d7c16f; font-family: Inter, Avenir Next, Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 690; letter-spacing: 4px; }
    </style>
  </defs>

  <rect x="0" y="0" width="4579.02" height="2850" fill="url(#wrap-bg)"/>
  <rect class="cover-mint" x="0" y="0" width="4579.02" height="10"/>

  <!-- Back cover -->
  <circle cx="1087.5" cy="1620" r="740" fill="url(#wrap-halo)"/>
  <circle cx="1087.5" cy="1620" r="540" fill="none" stroke="#38566e" stroke-width="2.3" stroke-dasharray="3 16" opacity="0.34"/>
  <circle cx="1087.5" cy="1620" r="238" fill="#7ad9b9" opacity="0.06"/>

  <text class="cover-heading" x="252" y="284">DATABASES · DATALOG · AGENT MEMORY</text>
  <text class="cover-title" x="252" y="410">One database for facts, logic,</text>
  <text class="cover-title" x="252" y="486">search, graph, and durable memory.</text>
  <rect class="cover-rule" x="252" y="548" width="260" height="6" rx="3"/>

  <text class="cover-body" x="252" y="672">
    <tspan x="252" dy="0">Modern applications increasingly need more than rows,</tspan>
    <tspan x="252" dy="58">documents, or a separate search stack. They need durable</tspan>
    <tspan x="252" dy="58">facts, expressive queries, graph-shaped relationships,</tspan>
    <tspan x="252" dy="58">full-text search, vector retrieval, and reliable memory for</tspan>
    <tspan x="252" dy="58">intelligent agents.</tspan>
  </text>

  <text class="cover-body" x="252" y="1042">
    <tspan x="252" dy="0">Datalevin brings those capabilities into one compact</tspan>
    <tspan x="252" dy="58">open-source database, six years in the making. Built on</tspan>
    <tspan x="252" dy="58">LMDB and Datalog, it gives application developers a</tspan>
    <tspan x="252" dy="58">practical path from local embedded storage to production</tspan>
    <tspan x="252" dy="58">systems that combine logic, search, and operational</tspan>
    <tspan x="252" dy="58">simplicity.</tspan>
  </text>

  <text class="cover-heading" x="252" y="1472">THIS BOOK TEACHES YOU TO</text>
  <text class="cover-bullet" x="286" y="1572">
    <tspan x="286" dy="0">model data as entities, attributes, and datoms</tspan>
    <tspan x="286" dy="58">write Datalog queries, rules, transactions, and pull patterns</tspan>
    <tspan x="286" dy="58">design relational, graph, document, vector, and hybrid models</tspan>
    <tspan x="286" dy="58">build persistent agent memory from episodes, facts, and recall</tspan>
  </text>
  <g fill="#7ad9b9">
    <circle cx="252" cy="1560" r="8"/>
    <circle cx="252" cy="1618" r="8"/>
    <circle cx="252" cy="1676" r="8"/>
    <circle cx="252" cy="1734" r="8"/>
  </g>

  <text class="cover-heading" x="252" y="1934">ABOUT THE AUTHOR</text>
  <text class="cover-small" x="252" y="2014">
    <tspan x="252" dy="0">Dr. Huahai Yang is the creator and maintainer of Datalevin.</tspan>
    <tspan x="252" dy="45">His work on Datalevin grew from practical needs at Juji, a</tspan>
    <tspan x="252" dy="45">conversational agent company he co-founded, where intelligent</tspan>
    <tspan x="252" dy="45">applications required fast retrieval, persistent memory, and</tspan>
    <tspan x="252" dy="45">flexible representations of user and agent state. He holds a</tspan>
    <tspan x="252" dy="45">Ph.D. from the University of Michigan, Ann Arbor, and has</tspan>
    <tspan x="252" dy="45">worked as a faculty member at University at Albany, SUNY, and</tspan>
    <tspan x="252" dy="45">as a research staff member at IBM Almaden Research Center.</tspan>
  </text>

  <text class="spine-imprint" x="252" y="2644">CALERO CREEK PRESS</text>
  <rect x="1462.5" y="2377.5" width="600" height="360" fill="#ffffff"/>

  <!-- Spine -->
  <rect x="2137.5" y="0" width="304.02" height="2850" fill="#071525" opacity="0.82"/>
  <!-- spine edge hairlines removed: they could telegraph as a defect on a binding shift -->
  <rect class="cover-mint" x="2137.5" y="0" width="304.02" height="10"/>
  <text class="spine-author" x="2289.51" y="214" text-anchor="middle">HUAHAI</text>
  <text class="spine-author" x="2289.51" y="264" text-anchor="middle">YANG</text>
  <g transform="translate(2289.51 1345) rotate(90)">
    <text class="spine-title" x="0" y="0" text-anchor="middle" dominant-baseline="central"><tspan fill="#f4f6f2">Data</tspan><tspan fill="#7ad9b9">levin</tspan></text>
    <text class="spine-subtitle" x="0" y="76" text-anchor="middle" dominant-baseline="central">LOGICAL AND INTELLIGENT DATABASES</text>
  </g>
  <g transform="translate(2250 2605) scale(0.09)">
