    <path fill="#d7c16f" d="M 56 168 L 212 -126 L 392 74 C 266 58 150 100 56 168 Z M 494 74 L 686 -126 L 836 168 C 742 100 620 58 494 74 Z"/>
    <g fill="none" stroke="#d7c16f" stroke-width="28" stroke-linecap="round">
      <path d="M279 236 L279 145 M337 260 L401 196 M361 318 L452 318 M337 376 L401 440 M279 400 L279 491 M221 376 L157 440 M197 318 L106 318 M221 260 L157 196"/>
      <path d="M619 236 L619 145 M677 260 L741 196 M701 318 L792 318 M677 376 L741 440 M619 400 L619 491 M561 376 L497 440 M537 318 L446 318 M561 260 L497 196"/>
    </g>
    <path fill="#d7c16f" fill-rule="evenodd" d="M 229 318 A 50 50 0 1 0 329 318 A 50 50 0 1 0 229 318 Z M 261 318 A 18 18 0 1 1 297 318 A 18 18 0 1 1 261 318 Z M 569 318 A 50 50 0 1 0 669 318 A 50 50 0 1 0 569 318 Z M 601 318 A 18 18 0 1 1 637 318 A 18 18 0 1 1 601 318 Z"/>
  </g>

  <!-- Front cover panel, embedded as vector artwork. -->
  <svg x="2441.52" y="0" width="2137.5" height="2850" viewBox="0 -37.5 2137.5 2850" preserveAspectRatio="xMidYMid meet">
