<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="title desc">
  <title id="title">Text embedding indexing pipeline</title>
  <desc id="desc">How :db/embedding indexes text, using one shared embedding provider. On write, transacting :doc/text stores the datom as-is in the Datalog store as [e :doc/text "..."], keeping the text as the source of truth, and also sends the text to the embedding provider. On query, embedding-neighbors sends the query text to the same embedding provider. The single provider turns text into vectors: the document vector is inserted into the HNSW vector index keyed to entity e, and the query vector is used for nearest-neighbor search in the same index. The search returns the nearest entities, whose stored :doc/text can then be pulled. Because both paths use one provider, model, and embedding space, write-time and query-time vectors are comparable. The vector is only a secondary index; unlike :db.type/vec, the stored value stays the original string.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .inb { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .prov { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.4; }
      .store { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .vchip { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.8; }
      .hnsw { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.4; }
      .vrow { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.4; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 27px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .lane { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .bt { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 720; }
      .bm { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, Menlo, monospace; font-size: 10.5px; font-weight: 500; }
      .bs { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10.5px; font-weight: 450; }
      .pt { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; font-weight: 720; }
      .ps { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 450; }
      .chipt { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 600; }
      .albl { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10px; font-weight: 700; }
      .hh { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 720; }
      .hs { fill: #64748b; font-family: "IBM Plex Mono", ui-monospace, Menlo, monospace; font-size: 9.5px; font-weight: 500; }
      .note { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 450; }
      .note-em { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 650; }
    </style>
    <marker id="a" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="card" x="2" y="2" width="996" height="396" rx="18" stroke="#e2e8f0" stroke-width="2"/>
  <text class="title" x="500" y="38" text-anchor="middle">Text Embedding Indexing</text>
  <text class="caption" x="500" y="62" text-anchor="middle">One provider embeds both stored text and queries into the same HNSW index.</text>

  <!-- ===== inputs (left) ===== -->
  <text class="lane" x="24" y="86">INDEX TIME</text>
  <rect class="inb" x="24" y="92" width="184" height="54" rx="10"/>
  <text class="bt" x="40" y="115">Write</text>
  <text class="bm" x="40" y="136">:doc/text "..."</text>

  <text class="lane" x="24" y="244">QUERY TIME</text>
  <rect class="inb" x="24" y="250" width="184" height="54" rx="10"/>
  <text class="bt" x="40" y="273">Query</text>
  <text class="bm" x="40" y="294">"vector search docs"</text>

  <!-- write also stores text -->
  <path class="flow" d="M80 146 V176" marker-end="url(#a)"/>
  <text class="albl" x="92" y="166" text-anchor="start">store as-is</text>
  <rect class="store" x="24" y="178" width="200" height="50" rx="10"/>
  <text class="bt" x="40" y="199">Datalog store</text>
  <text class="bm" x="40" y="219">[e :doc/text "..."]</text>

  <!-- ===== single shared provider (center) ===== -->
  <rect class="prov" x="262" y="132" width="180" height="132" rx="12"/>
  <text class="pt" x="352" y="180" text-anchor="middle">Embedding</text>
  <text class="pt" x="352" y="200" text-anchor="middle">provider</text>
  <text class="ps" x="352" y="224" text-anchor="middle">text &#8594; vector</text>
  <text class="ps" x="352" y="242" text-anchor="middle">one model &amp; space</text>

  <!-- inputs into provider -->
  <path class="flow" d="M208 119 C 240 130, 240 165, 258 172" marker-end="url(#a)"/>
  <path class="flow" d="M208 277 C 240 266, 240 233, 258 240" marker-end="url(#a)"/>

  <!-- provider out to vectors -->
  <path class="flow" d="M442 172 H486" marker-end="url(#a)"/>
  <rect class="vchip" x="490" y="153" width="120" height="38" rx="9"/>
  <text class="chipt" x="550" y="176" text-anchor="middle">doc vector</text>

  <path class="flow" d="M442 240 H486" marker-end="url(#a)"/>
  <rect class="vchip" x="490" y="221" width="120" height="38" rx="9"/>
  <text class="chipt" x="550" y="244" text-anchor="middle">query vector</text>

  <!-- vectors to HNSW -->
  <path class="flow" d="M610 172 H700" marker-end="url(#a)"/>
  <text class="albl" x="655" y="164" text-anchor="middle">insert</text>
  <path class="flow" d="M610 240 H700" marker-end="url(#a)"/>
  <text class="albl" x="655" y="232" text-anchor="middle">search</text>

  <!-- ===== shared HNSW index (right) ===== -->
  <rect class="hnsw" x="704" y="110" width="192" height="196" rx="12"/>
  <text class="hh" x="720" y="136">Vector index</text>
  <text class="hs" x="720" y="152">HNSW &#183; keyed to e</text>
  <rect class="vrow" x="720" y="166" width="160" height="22" rx="6"/>
  <text class="chipt" x="732" y="182">vec @ e1</text>
  <rect class="vrow" x="720" y="194" width="160" height="22" rx="6"/>
  <text class="chipt" x="732" y="210">vec @ e2</text>
  <rect class="vrow" x="720" y="222" width="160" height="22" rx="6"/>
  <text class="chipt" x="732" y="238">vec @ e3</text>
  <text class="hs" x="720" y="272">insert on write</text>
  <text class="hs" x="720" y="288">search on query</text>

  <!-- result out -->
  <path class="flow" d="M800 306 V340 H612" marker-end="url(#a)"/>
  <text class="note" x="608" y="344" text-anchor="end">nearest entities &#8594; pull stored :doc/text</text>

  <!-- bottom note: secondary index point -->
  <text class="note-em" x="24" y="378">The stored datom stays text &#8212; the source of truth;</text>
  <text class="note" x="356" y="378">the vector is only a secondary index (unlike :db.type/vec, which stores the vector).</text>
</svg>
