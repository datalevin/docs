<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">MVCC and the single writer</title>
  <desc id="desc">Datalevin's storage is a copy-on-write B+tree with several levels. The old root (version N) reaches its data through an old internal node and old leaf. To make a change, the single writer copies only the path from the root down to the changed leaf: a new root, a new internal node, and a new leaf. Both the old and new roots still point to the unchanged shared subtree. A reader that started earlier stays pinned to the old root as a stable snapshot, while a reader that started after the commit follows the new root. There is one writer at a time, and commit switches the root atomically.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .reader { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .writer { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.5; }
      .old { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2.5; }
      .shared { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2.5; }
      .new { fill: #f0fdfa; stroke: #0f766e; stroke-width: 3; }
      .ptr { fill: none; stroke: #94a3b8; stroke-width: 2.5; }
      .ptr-new { fill: none; stroke: #0f766e; stroke-width: 3; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 32px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 450; }
      .box-title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 22px; font-weight: 680; }
      .box-sub { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 450; }
      .teal-sub { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 600; }
      .level { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 17px; font-weight: 600; letter-spacing: 1px; }
    </style>
    <marker id="arrow-cyan" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0891b2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="596" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="48" text-anchor="middle">MVCC and the Single Writer</text>
  <text class="caption" x="500" y="80" text-anchor="middle">The writer copies only the root-to-leaf path; everything else is shared.</text>

  <!-- ===== Writer ===== -->
  <rect class="writer" x="590" y="100" width="180" height="52" rx="12"/>
  <text class="box-title" x="680" y="125" text-anchor="middle">Writer</text>
  <text class="teal-sub" x="680" y="145" text-anchor="middle">one at a time</text>
  <path class="ptr-new" d="M680 152 V176" marker-end="url(#arrow-teal)"/>

  <!-- ===== Tree edges (drawn under nodes) ===== -->
  <!-- old version edges -->
  <path class="ptr" d="M320 238 L272 322"/>
  <path class="ptr" d="M330 238 L468 322"/>
  <path class="ptr" d="M272 380 V440"/>
  <!-- new version edges -->
  <path class="ptr-new" d="M680 238 L728 322"/>
  <path class="ptr-new" d="M670 238 L532 322"/>
  <path class="ptr-new" d="M728 380 V440"/>

  <!-- ===== Roots ===== -->
  <rect class="old" x="246" y="178" width="150" height="60" rx="12"/>
  <text class="box-title" x="321" y="204" text-anchor="middle">Root vN</text>
  <text class="box-sub" x="321" y="225" text-anchor="middle">old</text>

  <rect class="new" x="604" y="178" width="150" height="60" rx="12"/>
  <text class="box-title" x="679" y="204" text-anchor="middle">Root vN+1</text>
  <text class="teal-sub" x="679" y="225" text-anchor="middle">new</text>

  <!-- ===== Readers ===== -->
  <rect class="reader" x="40" y="178" width="150" height="60" rx="12"/>
  <text class="box-title" x="115" y="204" text-anchor="middle">Reader A</text>
  <text class="box-sub" x="115" y="225" text-anchor="middle">started earlier</text>
  <path class="ptr" d="M196 208 H244" stroke="#0891b2" marker-end="url(#arrow-cyan)"/>

  <rect class="reader" x="810" y="178" width="150" height="60" rx="12"/>
  <text class="box-title" x="885" y="204" text-anchor="middle">Reader B</text>
  <text class="box-sub" x="885" y="225" text-anchor="middle">started later</text>
  <path class="ptr" d="M804 208 H756" stroke="#0891b2" marker-end="url(#arrow-cyan)"/>

  <!-- ===== Internal level ===== -->
  <rect class="old" x="202" y="322" width="140" height="58" rx="12"/>
  <text class="box-title" x="272" y="357" text-anchor="middle">Internal</text>

  <rect class="new" x="658" y="322" width="140" height="58" rx="12"/>
  <text class="box-title" x="728" y="357" text-anchor="middle">Internal′</text>

  <!-- shared subtree (spans internal + leaf levels) -->
  <rect class="shared" x="430" y="322" width="140" height="118" rx="12"/>
  <text class="box-title" x="500" y="368" text-anchor="middle">Shared</text>
  <text class="box-title" x="500" y="392" text-anchor="middle">subtree</text>
  <text class="box-sub" x="500" y="416" text-anchor="middle">unchanged</text>

  <!-- ===== Leaf level ===== -->
  <rect class="old" x="202" y="440" width="140" height="58" rx="12"/>
  <text class="box-title" x="272" y="467" text-anchor="middle">Leaf</text>
  <text class="box-sub" x="272" y="488" text-anchor="middle">old value</text>

  <rect class="new" x="658" y="440" width="140" height="58" rx="12"/>
  <text class="box-title" x="728" y="467" text-anchor="middle">Leaf′</text>
  <text class="teal-sub" x="728" y="488" text-anchor="middle">new value</text>

  <!-- ===== Bottom note ===== -->
  <text class="caption" x="500" y="548" text-anchor="middle">Commit switches the root atomically — Reader A keeps vN, Reader B sees vN+1.</text>
</svg>
