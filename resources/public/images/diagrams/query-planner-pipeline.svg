<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" role="img" aria-labelledby="title desc">
  <title id="title">Query planner pipeline</title>
  <desc id="desc">A Datalog query flows through five stages. Parse breaks the where clauses into constraints. Rewrite applies predicate pushdown, inequality conversion, and simplifies star attributes into chains. Estimate computes cardinality from DLMDB order statistics. Plan explores join orders with dynamic programming to build a left-deep join tree. Execute runs the plan as index scans. Rewrite, estimate, and plan together form the cost-based optimizer.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .row { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .brace { fill: none; stroke: #0f766e; stroke-width: 2.5; }
      .badge { fill: #0f766e; }
      .badge-num { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 20px; font-weight: 700; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 32px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 450; }
      .row-title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 23px; font-weight: 680; }
      .row-detail { fill: #334155; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 450; }
      .optimizer { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 650; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="536" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="46" text-anchor="middle">Query Planner Pipeline</text>
  <text class="caption" x="500" y="78" text-anchor="middle">From a Datalog query to an execution plan.</text>

  <!-- ===== Optimizer bracket over stages 2–4 ===== -->
  <path class="brace" d="M190 184 H160 V418 H190"/>
  <text class="optimizer" x="146" y="301" text-anchor="middle" transform="rotate(-90 146 301)">cost-based optimizer</text>

  <!-- ===== Stage spine arrows (in the gaps between rows) ===== -->
  <path class="line" d="M222 160 V184" marker-end="url(#arrow)"/>
  <path class="line" d="M222 246 V270" marker-end="url(#arrow)"/>
  <path class="line" d="M222 332 V356" marker-end="url(#arrow)"/>
  <path class="line" d="M222 418 V442" marker-end="url(#arrow)"/>

  <!-- ===== Stages ===== -->
  <rect class="row" x="190" y="98" width="630" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="129" r="15"/>
  <text class="badge-num" x="222" y="136" text-anchor="middle">1</text>
  <text class="row-title" x="250" y="137">Parse</text>
  <text class="row-detail" x="400" y="137">:where clauses &#8594; constraints</text>

  <rect class="row" x="190" y="184" width="630" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="215" r="15"/>
  <text class="badge-num" x="222" y="222" text-anchor="middle">2</text>
  <text class="row-title" x="250" y="223">Rewrite</text>
  <text class="row-detail" x="400" y="223">pushdown, inequality, star&#8594;chains</text>

  <rect class="row" x="190" y="270" width="630" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="301" r="15"/>
  <text class="badge-num" x="222" y="308" text-anchor="middle">3</text>
  <text class="row-title" x="250" y="309">Estimate</text>
  <text class="row-detail" x="400" y="309">cardinality from order statistics</text>

  <rect class="row" x="190" y="356" width="630" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="387" r="15"/>
  <text class="badge-num" x="222" y="394" text-anchor="middle">4</text>
  <text class="row-title" x="250" y="395">Plan</text>
  <text class="row-detail" x="400" y="395">join order via DP &#8594; left-deep tree</text>

  <rect class="row" x="190" y="442" width="630" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="473" r="15"/>
  <text class="badge-num" x="222" y="480" text-anchor="middle">5</text>
  <text class="row-title" x="250" y="481">Execute</text>
  <text class="row-detail" x="400" y="481">index scans run the plan</text>
</svg>
