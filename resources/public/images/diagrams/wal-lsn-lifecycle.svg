<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" role="img" aria-labelledby="title desc">
  <title id="title">WAL LSN lifecycle</title>
  <desc id="desc">In WAL mode each transaction is assigned a Log Sequence Number that advances through five stages. Committed means the transaction was committed in the database, tracked by last-committed-lsn. Durable means the WAL record was synced to the physical WAL file on disk, tracked by last-durable-lsn. Applied means the change is applied to the LMDB state or covered by a recovery marker, tracked by last-applied-lsn. These three watermarks are read with txlog-watermarks, and the gaps between them are the durability and replication lag. Checkpointed means create-snapshot! has forced WAL and LMDB state to disk, rotated snapshot slots, and advanced the snapshot floor. Reclaimed means gc-txlog-segments! has deleted old WAL segments below the retention floor.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .row { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .brace { fill: none; stroke: #0f766e; stroke-width: 2.5; }
      .badge { fill: #0f766e; }
      .badge-num { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 20px; font-weight: 700; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 32px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 450; }
      .row-title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 23px; font-weight: 680; }
      .row-detail { fill: #334155; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 18px; font-weight: 450; }
      .lag { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 650; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="536" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="46" text-anchor="middle">WAL LSN Lifecycle</text>
  <text class="caption" x="500" y="78" text-anchor="middle">How a WAL record advances from commit to reclaim.</text>

  <!-- ===== Watermark bracket over stages 1-3 ===== -->
  <path class="brace" d="M190 98 H160 V332 H190"/>
  <text class="lag" x="146" y="215" text-anchor="middle" transform="rotate(-90 146 215)">txlog-watermarks &#183; lag</text>

  <!-- ===== Stage spine arrows (in the gaps between rows) ===== -->
  <path class="line" d="M222 160 V184" marker-end="url(#arrow)"/>
  <path class="line" d="M222 246 V270" marker-end="url(#arrow)"/>
  <path class="line" d="M222 332 V356" marker-end="url(#arrow)"/>
  <path class="line" d="M222 418 V442" marker-end="url(#arrow)"/>

  <!-- ===== Stages ===== -->
  <rect class="row" x="190" y="98" width="660" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="129" r="15"/>
  <text class="badge-num" x="222" y="136" text-anchor="middle">1</text>
  <text class="row-title" x="250" y="137">Committed</text>
  <text class="row-detail" x="440" y="137">:last-committed-lsn &#183; in the DB</text>

  <rect class="row" x="190" y="184" width="660" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="215" r="15"/>
  <text class="badge-num" x="222" y="222" text-anchor="middle">2</text>
  <text class="row-title" x="250" y="223">Durable</text>
  <text class="row-detail" x="440" y="223">:last-durable-lsn &#183; in WAL on disk</text>

  <rect class="row" x="190" y="270" width="660" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="301" r="15"/>
  <text class="badge-num" x="222" y="308" text-anchor="middle">3</text>
  <text class="row-title" x="250" y="309">Applied</text>
  <text class="row-detail" x="440" y="309">:last-applied-lsn &#183; in LMDB state</text>

  <rect class="row" x="190" y="356" width="660" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="387" r="15"/>
  <text class="badge-num" x="222" y="394" text-anchor="middle">4</text>
  <text class="row-title" x="250" y="395">Checkpointed</text>
  <text class="row-detail" x="440" y="395">create-snapshot! &#183; rotate slots</text>

  <rect class="row" x="190" y="442" width="660" height="62" rx="12"/>
  <circle class="badge" cx="222" cy="473" r="15"/>
  <text class="badge-num" x="222" y="480" text-anchor="middle">5</text>
  <text class="row-title" x="250" y="481">Reclaimed</text>
  <text class="row-detail" x="440" y="481">gc-txlog-segments! &#183; drop old WAL</text>
</svg>
