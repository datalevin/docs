<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" role="img" aria-labelledby="title desc">
  <title id="title">AVE DUPSORT nesting</title>
  <desc id="desc">In the AVE index, the attribute/value pair is the key and the matching entity ids are stored as sorted duplicate values nested under that one key. The key person/age 30 maps to the sorted entity ids 101, 102, 105, 200, and more. The key person/age 31 maps to the sorted entity ids 103, 104, 201, and more. Finding all entities with a given value is one key lookup followed by a sequential read of entity ids.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .keybox { fill: #cffafe; stroke: #0891b2; stroke-width: 2.5; }
      .dupbox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .chip { fill: #ffffff; stroke: #93c5d6; stroke-width: 1.8; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 450; }
      .keypair { fill: #0e7490; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 18px; font-weight: 700; }
      .keysub { fill: #0891b2; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; }
      .duptag { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; }
      .idtx { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 18px; font-weight: 500; }
      .more { fill: #64748b; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 18px; font-weight: 500; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="336" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="42" text-anchor="middle">AVE &#8212; DUPSORT Nesting</text>
  <text class="caption" x="500" y="72" text-anchor="middle">The attribute/value pair is the key; sorted entity ids are nested duplicates.</text>

  <!-- ===== Key (:person/age, 30) ===== -->
  <rect class="keybox" x="48" y="104" width="244" height="84" rx="12"/>
  <text class="keypair" x="170" y="148" text-anchor="middle">(:person/age, 30)</text>
  <text class="keysub" x="170" y="170" text-anchor="middle">attribute + value (key)</text>
  <path class="line" d="M292 146 H352" marker-end="url(#arrow)"/>
  <rect class="dupbox" x="352" y="104" width="592" height="84" rx="12"/>
  <text class="duptag" x="930" y="124" text-anchor="end">sorted entity ids</text>
  <rect class="chip" x="376" y="136" width="62" height="40" rx="8"/>
  <text class="idtx" x="407" y="162" text-anchor="middle">101</text>
  <rect class="chip" x="450" y="136" width="62" height="40" rx="8"/>
  <text class="idtx" x="481" y="162" text-anchor="middle">102</text>
  <rect class="chip" x="524" y="136" width="62" height="40" rx="8"/>
  <text class="idtx" x="555" y="162" text-anchor="middle">105</text>
  <rect class="chip" x="598" y="136" width="62" height="40" rx="8"/>
  <text class="idtx" x="629" y="162" text-anchor="middle">200</text>
  <text class="more" x="684" y="162">&#8230;</text>

  <!-- ===== Key (:person/age, 31) ===== -->
  <rect class="keybox" x="48" y="220" width="244" height="84" rx="12"/>
  <text class="keypair" x="170" y="264" text-anchor="middle">(:person/age, 31)</text>
  <text class="keysub" x="170" y="286" text-anchor="middle">attribute + value (key)</text>
  <path class="line" d="M292 262 H352" marker-end="url(#arrow)"/>
  <rect class="dupbox" x="352" y="220" width="592" height="84" rx="12"/>
  <rect class="chip" x="376" y="252" width="62" height="40" rx="8"/>
  <text class="idtx" x="407" y="278" text-anchor="middle">103</text>
  <rect class="chip" x="450" y="252" width="62" height="40" rx="8"/>
  <text class="idtx" x="481" y="278" text-anchor="middle">104</text>
  <rect class="chip" x="524" y="252" width="62" height="40" rx="8"/>
  <text class="idtx" x="555" y="278" text-anchor="middle">201</text>
  <text class="more" x="610" y="278">&#8230;</text>
</svg>
