<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="title desc">
  <title id="title">Regular DBI versus list (DUPSORT) DBI</title>
  <desc id="desc">Two kinds of key-value sub-database. A regular DBI, opened with open-dbi, maps one key to exactly one value: key u-100 maps to Alice and key u-101 maps to Bob. A list DBI, opened with open-list-dbi, uses LMDB DUPSORT so one key maps to many sorted values: key post-1 maps to the sorted values clojure, database, lmdb, and key post-2 maps to graph, rules. The values nested under a single key are kept in sorted order.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .panel { fill: #fcfdfe; stroke: #e2e8f0; stroke-width: 1.6; }
      .keybox { fill: #cffafe; stroke: #0891b2; stroke-width: 2.2; }
      .valbox { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .dupbox { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; }
      .chip { fill: #ffffff; stroke: #93c5d6; stroke-width: 1.6; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.2; }
      .divider { fill: none; stroke: #cbd5e1; stroke-width: 1.6; stroke-dasharray: 2 6; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .ph { fill: #0e7490; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 19px; font-weight: 720; }
      .psub { fill: #475569; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 500; }
      .relt { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; }
      .kv { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 15px; font-weight: 600; }
      .chipt { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13.5px; font-weight: 500; }
      .tag { fill: #0f766e; }
      .tagt { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .sortlbl { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 600; }
    </style>
    <marker id="a" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="396" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="44" text-anchor="middle">Regular DBI vs. List DBI</text>
  <text class="caption" x="500" y="70" text-anchor="middle">One key maps to one value &#8212; or, with DUPSORT, to many sorted values.</text>

  <path class="divider" d="M500 104 V362"/>

  <!-- ================= LEFT: regular DBI ================= -->
  <rect class="panel" x="30" y="96" width="448" height="266" rx="12"/>
  <text class="ph" x="52" y="130">Regular DBI</text>
  <text class="psub" x="52" y="152">open-dbi &#183; one key &#8594; one value</text>

  <text class="relt" x="115" y="188" text-anchor="middle">key</text>
  <text class="relt" x="350" y="188" text-anchor="middle">value</text>

  <rect class="keybox" x="56" y="200" width="120" height="46" rx="10"/>
  <text class="kv" x="116" y="229" text-anchor="middle">"u-100"</text>
  <path class="line" d="M176 223 H296" marker-end="url(#a)"/>
  <rect class="valbox" x="300" y="200" width="150" height="46" rx="10"/>
  <text class="kv" x="375" y="229" text-anchor="middle">"Alice"</text>

  <rect class="keybox" x="56" y="290" width="120" height="46" rx="10"/>
  <text class="kv" x="116" y="319" text-anchor="middle">"u-101"</text>
  <path class="line" d="M176 313 H296" marker-end="url(#a)"/>
  <rect class="valbox" x="300" y="290" width="150" height="46" rx="10"/>
  <text class="kv" x="375" y="319" text-anchor="middle">"Bob"</text>

  <!-- ================= RIGHT: list DBI (DUPSORT) ================= -->
  <rect class="panel" x="522" y="96" width="448" height="266" rx="12"/>
  <text class="ph" x="544" y="130">List DBI</text>
  <rect class="tag" x="648" y="114" width="74" height="20" rx="10"/>
  <text class="tagt" x="685" y="128" text-anchor="middle">DUPSORT</text>
  <text class="psub" x="544" y="152">open-list-dbi &#183; one key &#8594; sorted values</text>

  <text class="relt" x="600" y="188" text-anchor="middle">key</text>
  <text class="sortlbl" x="824" y="188" text-anchor="middle">sorted values &#8594;</text>

  <rect class="keybox" x="544" y="200" width="118" height="46" rx="10"/>
  <text class="kv" x="603" y="229" text-anchor="middle">"post-1"</text>
  <path class="line" d="M662 223 H702" marker-end="url(#a)"/>
  <rect class="dupbox" x="704" y="194" width="248" height="58" rx="10"/>
  <rect class="chip" x="716" y="208" width="76" height="30" rx="7"/>
  <text class="chipt" x="754" y="228" text-anchor="middle">clojure</text>
  <rect class="chip" x="800" y="208" width="86" height="30" rx="7"/>
  <text class="chipt" x="843" y="228" text-anchor="middle">database</text>
  <rect class="chip" x="894" y="208" width="50" height="30" rx="7"/>
  <text class="chipt" x="919" y="228" text-anchor="middle">lmdb</text>

  <rect class="keybox" x="544" y="290" width="118" height="46" rx="10"/>
  <text class="kv" x="603" y="319" text-anchor="middle">"post-2"</text>
  <path class="line" d="M662 313 H702" marker-end="url(#a)"/>
  <rect class="dupbox" x="704" y="290" width="248" height="46" rx="10"/>
  <rect class="chip" x="716" y="298" width="64" height="30" rx="7"/>
  <text class="chipt" x="748" y="318" text-anchor="middle">graph</text>
  <rect class="chip" x="788" y="298" width="56" height="30" rx="7"/>
  <text class="chipt" x="816" y="318" text-anchor="middle">rules</text>
</svg>
