<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="350" viewBox="0 0 1000 350" role="img" aria-labelledby="title desc">
  <title id="title">EAV DUPSORT nesting</title>
  <desc id="desc">In the EAV index, the entity id is the key and its attribute/value pairs are stored as sorted duplicate values nested under that one key. Entity 101 maps to the sorted pairs person/age 30, person/email alice@example.com, and person/name Alice. Entity 102 maps to person/age 31 and person/name Bob. The shared entity id is stored once instead of being repeated for every datom.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .keybox { fill: #cffafe; stroke: #0891b2; stroke-width: 2.5; }
      .dupbox { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 450; }
      .keynum { fill: #0e7490; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 28px; font-weight: 700; }
      .keysub { fill: #0891b2; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; }
      .duptag { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; }
      .val { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 17px; font-weight: 450; }
      .mark { fill: #0891b2; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="346" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="42" text-anchor="middle">EAV &#8212; DUPSORT Nesting</text>
  <text class="caption" x="500" y="72" text-anchor="middle">The entity id is the key; its sorted attribute/value pairs are nested duplicates.</text>

  <!-- ===== Entity 101 ===== -->
  <rect class="keybox" x="56" y="108" width="130" height="92" rx="12"/>
  <text class="keynum" x="121" y="160" text-anchor="middle">101</text>
  <text class="keysub" x="121" y="182" text-anchor="middle">entity id (key)</text>
  <path class="line" d="M186 154 H250" marker-end="url(#arrow)"/>
  <rect class="dupbox" x="250" y="100" width="694" height="108" rx="12"/>
  <text class="duptag" x="930" y="120" text-anchor="end">sorted duplicates</text>
  <circle class="mark" cx="278" cy="139" r="4"/>
  <text class="val" x="294" y="144">(:person/age, 30)</text>
  <circle class="mark" cx="278" cy="167" r="4"/>
  <text class="val" x="294" y="172">(:person/email, "alice@example.com")</text>
  <circle class="mark" cx="278" cy="195" r="4"/>
  <text class="val" x="294" y="200">(:person/name, "Alice")</text>

  <!-- ===== Entity 102 ===== -->
  <rect class="keybox" x="56" y="232" width="130" height="80" rx="12"/>
  <text class="keynum" x="121" y="278" text-anchor="middle">102</text>
  <text class="keysub" x="121" y="298" text-anchor="middle">entity id (key)</text>
  <path class="line" d="M186 272 H250" marker-end="url(#arrow)"/>
  <rect class="dupbox" x="250" y="232" width="694" height="80" rx="12"/>
  <circle class="mark" cx="278" cy="263" r="4"/>
  <text class="val" x="294" y="268">(:person/age, 31)</text>
  <circle class="mark" cx="278" cy="291" r="4"/>
  <text class="val" x="294" y="296">(:person/name, "Bob")</text>
</svg>
