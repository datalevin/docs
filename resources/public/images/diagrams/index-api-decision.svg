<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="524" viewBox="0 0 1000 524" role="img" aria-labelledby="title desc">
  <title id="title">Choosing a direct index API</title>
  <desc id="desc">A top-down decision flow for choosing a direct index read. If you only need a count, use count-datoms for the number of matching datoms or cardinality for the number of distinct values of an attribute. Otherwise, if you know the target index and a prefix of its key, use datoms. Otherwise, if you have an entity-attribute-value pattern with wildcards, use search-datoms, which picks the index. Otherwise, if you want all values of one attribute within a range, use index-range. Otherwise, if you need a cursor starting at a bound, use seek-datoms to go forward from a lower bound or rseek-datoms to go backward from an upper bound.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .qbox { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .chip { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2; }
      .badge { fill: #0f766e; }
      .badge-num { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; }
      .yes { fill: none; stroke: #0f766e; stroke-width: 2.4; }
      .no { fill: none; stroke: #94a3b8; stroke-width: 2.2; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .qt { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; }
      .yeslbl { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .nolbl { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .api { fill: #0f766e; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 15px; font-weight: 700; }
      .apisub { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 450; }
      .orlbl { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; }
    </style>
    <marker id="ya" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="na" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="520" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="42" text-anchor="middle">Choosing a Direct Index API</text>
  <text class="caption" x="500" y="68" text-anchor="middle">Read top-down; take the first branch that matches what you need.</text>

  <!-- ===== no spine arrows ===== -->
  <path class="no" d="M120 182 V202" marker-end="url(#na)"/>
  <text class="nolbl" x="132" y="196">no</text>
  <path class="no" d="M120 260 V280" marker-end="url(#na)"/>
  <text class="nolbl" x="132" y="274">no</text>
  <path class="no" d="M120 338 V358" marker-end="url(#na)"/>
  <text class="nolbl" x="132" y="352">no</text>
  <path class="no" d="M120 416 V436" marker-end="url(#na)"/>
  <text class="nolbl" x="132" y="430">no</text>

  <!-- ===== yes arrows ===== -->
  <path class="yes" d="M436 153 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="470" y="146" text-anchor="middle">yes</text>
  <path class="yes" d="M436 231 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="470" y="224" text-anchor="middle">yes</text>
  <path class="yes" d="M436 309 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="470" y="302" text-anchor="middle">yes</text>
  <path class="yes" d="M436 387 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="470" y="380" text-anchor="middle">yes</text>
  <path class="yes" d="M436 465 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="470" y="458" text-anchor="middle">yes</text>

  <!-- ===== Q1: count ===== -->
  <rect class="qbox" x="56" y="124" width="380" height="58" rx="11"/>
  <circle class="badge" cx="84" cy="153" r="13"/>
  <text class="badge-num" x="84" y="158" text-anchor="middle">1</text>
  <text class="qt" x="106" y="158">Only need a count?</text>
  <rect class="chip" x="504" y="126" width="200" height="54" rx="11"/>
  <text class="api" x="520" y="150">count-datoms</text>
  <text class="apisub" x="520" y="168">number of matching datoms</text>
  <text class="orlbl" x="716" y="156" text-anchor="middle">or</text>
  <rect class="chip" x="732" y="126" width="212" height="54" rx="11"/>
  <text class="api" x="748" y="150">cardinality</text>
  <text class="apisub" x="748" y="168">distinct values of an attribute</text>

  <!-- ===== Q2: known prefix ===== -->
  <rect class="qbox" x="56" y="202" width="380" height="58" rx="11"/>
  <circle class="badge" cx="84" cy="231" r="13"/>
  <text class="badge-num" x="84" y="236" text-anchor="middle">2</text>
  <text class="qt" x="106" y="236">Know the index + a key prefix?</text>
  <rect class="chip" x="504" y="204" width="240" height="54" rx="11"/>
  <text class="api" x="520" y="228">datoms</text>
  <text class="apisub" x="520" y="246">scan a known :eav / :ave prefix</text>

  <!-- ===== Q3: wildcard pattern ===== -->
  <rect class="qbox" x="56" y="280" width="380" height="58" rx="11"/>
  <circle class="badge" cx="84" cy="309" r="13"/>
  <text class="badge-num" x="84" y="314" text-anchor="middle">3</text>
  <text class="qt" x="106" y="314">An (e a v) pattern with wildcards?</text>
  <rect class="chip" x="504" y="282" width="290" height="54" rx="11"/>
  <text class="api" x="520" y="306">search-datoms</text>
  <text class="apisub" x="520" y="324">wildcards in any position; picks the index</text>

  <!-- ===== Q4: attribute range ===== -->
  <rect class="qbox" x="56" y="358" width="380" height="58" rx="11"/>
  <circle class="badge" cx="84" cy="387" r="13"/>
  <text class="badge-num" x="84" y="392" text-anchor="middle">4</text>
  <text class="qt" x="106" y="392">One attribute's values in a range?</text>
  <rect class="chip" x="504" y="360" width="250" height="54" rx="11"/>
  <text class="api" x="520" y="384">index-range</text>
  <text class="apisub" x="520" y="402">one attribute, value range</text>

  <!-- ===== Q5: cursor ===== -->
  <rect class="qbox" x="56" y="436" width="380" height="58" rx="11"/>
  <circle class="badge" cx="84" cy="465" r="13"/>
  <text class="badge-num" x="84" y="470" text-anchor="middle">5</text>
  <text class="qt" x="106" y="470">Need a cursor from a bound?</text>
  <rect class="chip" x="504" y="438" width="210" height="54" rx="11"/>
  <text class="api" x="520" y="462">seek-datoms</text>
  <text class="apisub" x="520" y="480">forward from a lower bound</text>
  <text class="orlbl" x="726" y="468" text-anchor="middle">or</text>
  <rect class="chip" x="742" y="438" width="214" height="54" rx="11"/>
  <text class="api" x="758" y="462">rseek-datoms</text>
  <text class="apisub" x="758" y="480">reverse from an upper bound</text>
</svg>
