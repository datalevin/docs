<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Choosing an ingestion strategy</title>
  <desc id="desc">A top-down decision flow for choosing how to ingest data. Question 1: can you supply final prepared datoms with no tempids, lookup refs, or upserts? If yes, use bulk load with init-db or fill-db, the fastest path, which bypasses transactions and the WAL. Otherwise, question 2: is this a one-time import you can rebuild from source? If yes, use a non-durable import with :nosync or :writemap and :mapasync for maximum write speed, accepting that a crash may corrupt the database so you rebuild. Otherwise, question 3: is it an interactive or modest write rate? If yes, use normal transactions with transact!, which give full integrity including tempids, lookup refs, upserts, and transaction functions. Otherwise, question 4: do you need periodic durability checkpoints? If yes, use async transactions plus sync for throughput with durable checkpoints; if no, use async transactions with WAL for the highest durable OLTP throughput while staying queryable.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .qbox { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .chip { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2; }
      .badge { fill: #0f766e; }
      .badge-num { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; }
      .yes { fill: none; stroke: #0f766e; stroke-width: 2.4; }
      .no { fill: none; stroke: #94a3b8; stroke-width: 2.2; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .qt { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14.5px; font-weight: 600; }
      .yeslbl { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .nolbl { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .ct { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 720; }
      .capi { fill: #0e7490; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12.5px; font-weight: 600; }
      .cnote { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 450; }
    </style>
    <marker id="ya" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="na" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="496" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="42" text-anchor="middle">Choosing an Ingestion Strategy</text>
  <text class="caption" x="500" y="68" text-anchor="middle">Match the write path to what you need: integrity, durability, or raw speed.</text>

  <!-- ===== no spine ===== -->
  <path class="no" d="M104 178 V210" marker-end="url(#na)"/>
  <text class="nolbl" x="116" y="198">no</text>
  <path class="no" d="M104 258 V290" marker-end="url(#na)"/>
  <text class="nolbl" x="116" y="278">no</text>
  <path class="no" d="M104 338 V372" marker-end="url(#na)"/>
  <text class="nolbl" x="116" y="359">no</text>

  <!-- ===== yes arrows ===== -->
  <path class="yes" d="M456 154 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="480" y="147" text-anchor="middle">yes</text>
  <path class="yes" d="M456 234 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="480" y="227" text-anchor="middle">yes</text>
  <path class="yes" d="M456 314 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="480" y="307" text-anchor="middle">yes</text>
  <path class="yes" d="M456 388 H504" marker-end="url(#ya)"/>
  <text class="yeslbl" x="480" y="381" text-anchor="middle">yes</text>
  <path class="no" d="M104 420 C 104 470, 330 459, 502 459" marker-end="url(#na)"/>
  <text class="nolbl" x="118" y="433">no</text>

  <!-- ===== Q1 ===== -->
  <rect class="qbox" x="56" y="130" width="400" height="48" rx="11"/>
  <circle class="badge" cx="84" cy="154" r="13"/>
  <text class="badge-num" x="84" y="159" text-anchor="middle">1</text>
  <text class="qt" x="106" y="159">Can you supply final prepared datoms?</text>

  <!-- ===== Q2 ===== -->
  <rect class="qbox" x="56" y="210" width="400" height="48" rx="11"/>
  <circle class="badge" cx="84" cy="234" r="13"/>
  <text class="badge-num" x="84" y="239" text-anchor="middle">2</text>
  <text class="qt" x="106" y="239">One-time import, rebuildable from source?</text>

  <!-- ===== Q3 ===== -->
  <rect class="qbox" x="56" y="290" width="400" height="48" rx="11"/>
  <circle class="badge" cx="84" cy="314" r="13"/>
  <text class="badge-num" x="84" y="319" text-anchor="middle">3</text>
  <text class="qt" x="106" y="319">Interactive or modest write rate?</text>

  <!-- ===== Q4 ===== -->
  <rect class="qbox" x="56" y="372" width="400" height="48" rx="11"/>
  <circle class="badge" cx="84" cy="396" r="13"/>
  <text class="badge-num" x="84" y="401" text-anchor="middle">4</text>
  <text class="qt" x="106" y="401">Need periodic durability checkpoints?</text>

  <!-- ===== Outcome: bulk load ===== -->
  <rect class="chip" x="504" y="126" width="456" height="56" rx="11"/>
  <text class="ct" x="522" y="148">Bulk load</text>
  <text class="capi" x="620" y="148">init-db / fill-db</text>
  <text class="cnote" x="522" y="170">fastest &#8212; bypasses transactions and the WAL (prepared datoms only)</text>

  <!-- ===== Outcome: non-durable import ===== -->
  <rect class="chip" x="504" y="204" width="456" height="68" rx="11"/>
  <text class="ct" x="522" y="226">Non-durable import</text>
  <text class="capi" x="522" y="247">:nosync &#183; :writemap + :mapasync</text>
  <text class="cnote" x="522" y="266">max write speed; a crash may corrupt &#8594; rebuild</text>

  <!-- ===== Outcome: normal transactions ===== -->
  <rect class="chip" x="504" y="286" width="456" height="56" rx="11"/>
  <text class="ct" x="522" y="308">Normal transactions</text>
  <text class="capi" x="710" y="308">transact!</text>
  <text class="cnote" x="522" y="330">full integrity: tempids, lookup refs, upserts, tx-fns</text>

  <!-- ===== Outcome: async + sync checkpoint ===== -->
  <rect class="chip" x="504" y="362" width="456" height="54" rx="11"/>
  <text class="ct" x="522" y="384">Async + sync checkpoint</text>
  <text class="capi" x="746" y="384">transact-async + sync</text>
  <text class="cnote" x="522" y="404">high throughput with durable checkpoints</text>

  <!-- ===== Outcome: async + WAL ===== -->
  <rect class="chip" x="504" y="432" width="456" height="54" rx="11"/>
  <text class="ct" x="522" y="454">Async + WAL</text>
  <text class="capi" x="640" y="454">transact-async + WAL</text>
  <text class="cnote" x="522" y="474">highest durable OLTP throughput; stays queryable</text>
</svg>
