<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="410" viewBox="0 0 1000 410" role="img" aria-labelledby="title desc">
  <title id="title">Capstone documentation-feedback memory loop</title>
  <desc id="desc">A documentation-feedback loop in five stages. Stage 1, feedback episodes: three not-helpful searches about backup and restore, plus one helpful search that is kept but not a gap. Stage 2, candidate gap: a background job groups the failed searches by topic and, when the count meets the threshold of two, computes a candidate gap for backup and restore; this is application-computed, not a stored entity. Stage 3, current fact: the job accepts a docs-gap fact with status current and confidence, linking the source episodes as evidence and superseding any prior gap fact. Stage 4, review task: a docs-gap-review task in state ready is opened against the fact for human review, not automatic publication. Stage 5, working memory: a bounded projection selects the gap fact and its evidence episodes as slots for the task. A dashed return path closes the loop: resolving the task improves the docs, which leads to fewer failed searches. Boxes are stored in Datalevin; the dashed candidate-gap box is an application-computed intermediate; the transitions are application policy.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .eb { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .gb { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 6 4; }
      .tb { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2; }
      .wb { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .badge { fill: #0f766e; }
      .badge-a { fill: #d97706; }
      .bn { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .st { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 720; }
      .sub { fill: #64748b; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 9.5px; font-weight: 500; }
      .ln { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 10px; font-weight: 500; }
      .ln-mut { fill: #94a3b8; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 10px; font-weight: 500; }
      .x { fill: #dc2626; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10px; font-weight: 700; }
      .ok { fill: #16a34a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10px; font-weight: 700; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2; }
      .tlbl { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10px; font-weight: 700; }
      .loop { fill: none; stroke: #0f766e; stroke-width: 2; stroke-dasharray: 5 4; }
      .looplbl { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11.5px; font-style: italic; font-weight: 600; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .leg { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 450; }
    </style>
    <marker id="a" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="al" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="card" x="2" y="2" width="996" height="406" rx="18" stroke="#e2e8f0" stroke-width="2"/>
  <text class="title" x="500" y="40" text-anchor="middle">Capstone: Feedback Memory Loop</text>
  <text class="caption" x="500" y="64" text-anchor="middle">Reader feedback becomes a reviewable task &#8212; Datalevin stores each step.</text>

  <!-- ===== transition labels ===== -->
  <text class="tlbl" x="185" y="200" text-anchor="middle">group</text>
  <text class="tlbl" x="185" y="214" text-anchor="middle">&#8805; 2 hits</text>
  <text class="tlbl" x="395" y="207" text-anchor="middle">accept</text>
  <text class="tlbl" x="605" y="207" text-anchor="middle">open task</text>
  <text class="tlbl" x="815" y="207" text-anchor="middle">project</text>

  <!-- ===== stage arrows ===== -->
  <path class="flow" d="M150 228 H218" marker-end="url(#a)"/>
  <path class="flow" d="M360 228 H428" marker-end="url(#a)"/>
  <path class="flow" d="M570 228 H638" marker-end="url(#a)"/>
  <path class="flow" d="M780 228 H848" marker-end="url(#a)"/>

  <!-- ===== Stage 1: feedback episodes ===== -->
  <rect class="eb" x="10" y="130" width="140" height="170" rx="11"/>
  <circle class="badge" cx="26" cy="152" r="10"/>
  <text class="bn" x="26" y="156" text-anchor="middle">1</text>
  <text class="st" x="42" y="156">Episodes</text>
  <text class="sub" x="22" y="176">search-feedback</text>
  <text class="x" x="22" y="200">&#10007;</text>
  <text class="ln" x="34" y="200">backup restore</text>
  <text class="x" x="22" y="220">&#10007;</text>
  <text class="ln" x="34" y="220">backup verif.</text>
  <text class="x" x="22" y="240">&#10007;</text>
  <text class="ln" x="34" y="240">restore wal</text>
  <text class="ok" x="22" y="262">&#10003;</text>
  <text class="ln-mut" x="34" y="262">datalog recursion</text>
  <text class="sub" x="22" y="286">helpful &#8212; not a gap</text>

  <!-- ===== Stage 2: candidate gap ===== -->
  <rect class="gb" x="220" y="130" width="140" height="170" rx="11"/>
  <circle class="badge-a" cx="236" cy="152" r="10"/>
  <text class="bn" x="236" y="156" text-anchor="middle">2</text>
  <text class="st" x="252" y="156">Candidate gap</text>
  <text class="sub" x="232" y="176">app-computed</text>
  <text class="ln" x="232" y="206">topic:</text>
  <text class="ln" x="232" y="224">"backup and</text>
  <text class="ln" x="232" y="240"> restore"</text>
  <text class="ln" x="232" y="268">3 hits</text>
  <text class="sub" x="232" y="286">&#8805; threshold 2</text>

  <!-- ===== Stage 3: current fact ===== -->
  <rect class="tb" x="430" y="130" width="140" height="170" rx="11"/>
  <circle class="badge" cx="446" cy="152" r="10"/>
  <text class="bn" x="446" y="156" text-anchor="middle">3</text>
  <text class="st" x="462" y="156">Current fact</text>
  <text class="sub" x="442" y="176">semantic memory</text>
  <text class="ln" x="442" y="202">kind: docs-gap</text>
  <text class="ln" x="442" y="222">status: current</text>
  <text class="ln" x="442" y="242">confidence 0.85</text>
  <text class="ln" x="442" y="262">evidence &#8594; 3 eps</text>
  <text class="sub" x="442" y="286">supersedes prior</text>

  <!-- ===== Stage 4: review task ===== -->
  <rect class="tb" x="640" y="130" width="140" height="170" rx="11"/>
  <circle class="badge" cx="656" cy="152" r="10"/>
  <text class="bn" x="656" y="156" text-anchor="middle">4</text>
  <text class="st" x="672" y="156">Review task</text>
  <text class="sub" x="652" y="176">task state</text>
  <text class="ln" x="652" y="206">docs-gap-</text>
  <text class="ln" x="652" y="222"> review</text>
  <text class="ln" x="652" y="248">state: ready</text>
  <text class="ln" x="652" y="268">&#8594; fact</text>
  <text class="sub" x="652" y="288">human review</text>

  <!-- ===== Stage 5: working memory ===== -->
  <rect class="wb" x="850" y="130" width="140" height="170" rx="11"/>
  <circle class="badge" cx="866" cy="152" r="10"/>
  <text class="bn" x="866" y="156" text-anchor="middle">5</text>
  <text class="st" x="882" y="156">Working mem.</text>
  <text class="sub" x="862" y="176">bounded slots</text>
  <text class="ln" x="862" y="206">slot &#8594; fact</text>
  <text class="ln-mut" x="862" y="226">relevance 1.0</text>
  <text class="ln" x="862" y="252">slot &#8594; evidence</text>
  <text class="ln-mut" x="862" y="272">episodes</text>

  <!-- ===== loop-back ===== -->
  <path class="loop" d="M920 300 V338 H80 V300" marker-end="url(#al)"/>
  <text class="looplbl" x="500" y="332" text-anchor="middle">resolved gap &#8594; better docs &#8594; fewer failed searches</text>

  <!-- ===== legend ===== -->
  <rect class="eb" x="120" y="362" width="16" height="14" rx="4"/>
  <text class="leg" x="142" y="374">stored in Datalevin</text>
  <rect class="gb" x="300" y="362" width="16" height="14" rx="4"/>
  <text class="leg" x="322" y="374">app-computed intermediate</text>
  <text class="leg" x="560" y="374">transitions = application policy</text>
</svg>
