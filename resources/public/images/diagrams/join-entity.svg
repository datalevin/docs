<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="title desc">
  <title id="title">Reifying an edge into a join entity</title>
  <desc id="desc">A simple directed edge is transformed into a join entity so the relationship can carry data. Before: user A points to user B with a single :user/follows reference, which has nowhere to store edge data. After: a Follow entity sits between them as a hub node. The Follow entity has a :follow/follower reference to user A and a :follow/following reference to user B, and it holds scalar properties on the relationship itself, such as created-at 2024-01-01 and strength 0.85. User A is the follower and user B is the following. This gives property-graph-style edges while keeping Datalevin's normalized fact representation.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .follow { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.6; }
      .edge { fill: none; stroke: #64748b; stroke-width: 2.2; }
      .becomes { fill: none; stroke: #0f766e; stroke-width: 3; }
      .fdiv { stroke: #99e6d6; stroke-width: 1.6; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 17px; font-weight: 450; }
      .nodet { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 650; }
      .elbl { fill: #475569; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px; font-weight: 500; }
      .bnote { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-style: italic; font-weight: 450; }
      .blabel { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 700; }
      .fhead { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 17px; font-weight: 720; }
      .fsub { fill: #64748b; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11px; font-weight: 500; }
      .fprop { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px; font-weight: 500; }
      .role { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-style: italic; font-weight: 500; }
    </style>
    <marker id="a" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="at" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="396" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="42" text-anchor="middle">Edges With Properties: the Join Entity</text>
  <text class="caption" x="500" y="70" text-anchor="middle">Reify an edge into a node when the relationship itself carries data.</text>

  <!-- ===== BEFORE: simple edge ===== -->
  <rect class="node" x="322" y="100" width="96" height="44" rx="22"/>
  <text class="nodet" x="370" y="127" text-anchor="middle">user A</text>
  <rect class="node" x="582" y="100" width="96" height="44" rx="22"/>
  <text class="nodet" x="630" y="127" text-anchor="middle">user B</text>
  <path class="edge" d="M418 122 H578" marker-end="url(#a)"/>
  <text class="elbl" x="500" y="114" text-anchor="middle">:user/follows</text>
  <text class="bnote" x="500" y="166" text-anchor="middle">a single ref &#8212; no place for edge data</text>

  <!-- ===== becomes ===== -->
  <path class="becomes" d="M500 180 V210" marker-end="url(#at)"/>
  <text class="blabel" x="550" y="200" text-anchor="start">becomes</text>

  <!-- ===== AFTER: join entity ===== -->
  <rect class="node" x="120" y="296" width="96" height="44" rx="22"/>
  <text class="nodet" x="168" y="323" text-anchor="middle">user A</text>
  <text class="role" x="168" y="362" text-anchor="middle">(follower)</text>

  <rect class="node" x="784" y="296" width="96" height="44" rx="22"/>
  <text class="nodet" x="832" y="323" text-anchor="middle">user B</text>
  <text class="role" x="832" y="362" text-anchor="middle">(following)</text>

  <rect class="follow" x="406" y="250" width="188" height="110" rx="14"/>
  <text class="fhead" x="500" y="276" text-anchor="middle">Follow</text>
  <text class="fsub" x="500" y="292" text-anchor="middle">:follow/* entity</text>
  <line class="fdiv" x1="418" y1="300" x2="582" y2="300"/>
  <text class="fprop" x="424" y="322">created-at  2024-01-01</text>
  <text class="fprop" x="424" y="344">strength    0.85</text>

  <path class="edge" d="M404 302 L220 316" marker-end="url(#a)"/>
  <text class="elbl" x="305" y="300" text-anchor="middle">:follow/follower</text>
  <path class="edge" d="M596 302 L780 316" marker-end="url(#a)"/>
  <text class="elbl" x="695" y="300" text-anchor="middle">:follow/following</text>
</svg>
