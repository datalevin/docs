<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Datalevin deployment topologies</title>
  <desc id="desc">The same Datalevin database runs under six operational boundaries. Embedded: the application and the database share one process, using the OS page cache with no network. Server: remote clients reach a server holding the database over dtlv://, adding network latency and RBAC. Async read replica: a primary database ships WAL records to a read-only replica, giving read scaling with eventual consistency. Consensus-lease HA: a write leader and follower databases coordinate through Raft with fencing, giving automatic failover at the cost of quorum discipline. MCP: an AI tool reaches the database through an MCP boundary where writes are off by default. Babashka pod: a script reaches the database over an IPC pod boundary, convenient but not the zero-copy embedded path.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .panel { fill: #fcfdfe; stroke: #d7e7ee; stroke-width: 1.6; }
      .phead { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.6; }
      .pname { fill: #0e7490; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 720; }
      .bound { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.6; stroke-dasharray: 5 4; }
      .bnd-lbl { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10.5px; font-weight: 600; }
      .smbox { fill: #ffffff; stroke: #64748b; stroke-width: 1.8; }
      .smt { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; }
      .cyl-b { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; }
      .cyl-t { fill: #cffafe; stroke: #0891b2; stroke-width: 1.8; }
      .cyl-l { fill: #0e7490; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 10px; font-weight: 700; }
      .nodelbl { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10.5px; font-weight: 600; }
      .arr { fill: none; stroke: #64748b; stroke-width: 1.8; }
      .arrlbl { fill: #475569; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 10.5px; font-weight: 600; }
      .note { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11.5px; font-weight: 450; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .badge { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.4; }
      .badget { fill: #b45309; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10px; font-weight: 700; }
    </style>
    <marker id="ar" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="card" x="2" y="2" width="996" height="556" rx="18" stroke="#e2e8f0" stroke-width="2"/>
  <text class="title" x="500" y="42" text-anchor="middle">Deployment Topologies</text>
  <text class="caption" x="500" y="70" text-anchor="middle">The same database engine; each mode wraps it in a different operational boundary.</text>

  <!-- ================= Row 1 ================= -->
  <!-- Card 1: Embedded -->
  <rect class="panel" x="26" y="92" width="302" height="212" rx="12"/>
  <path class="phead" d="M26 104 a12 12 0 0 1 12 -12 h278 a12 12 0 0 1 12 12 v18 h-302 z"/>
  <text class="pname" x="42" y="116">Embedded</text>
  <rect class="bound" x="46" y="150" width="262" height="76" rx="10"/>
  <text class="bnd-lbl" x="58" y="166">one process</text>
  <rect class="smbox" x="66" y="178" width="76" height="38" rx="8"/>
  <text class="smt" x="104" y="201" text-anchor="middle">app</text>
  <path class="arr" d="M142 197 H230" marker-end="url(#ar)"/>
  <path class="cyl-b" d="M234 187 L234 207 A16 5 0 0 0 266 207 L266 187 Z"/>
  <ellipse class="cyl-t" cx="250" cy="187" rx="16" ry="5"/>
  <text class="cyl-l" x="250" y="201" text-anchor="middle">DB</text>
  <text class="note" x="42" y="262">in-process &#183; OS page cache</text>
  <text class="note" x="42" y="280">no network, local path</text>

  <!-- Card 2: Server -->
  <rect class="panel" x="349" y="92" width="302" height="212" rx="12"/>
  <path class="phead" d="M349 104 a12 12 0 0 1 12 -12 h278 a12 12 0 0 1 12 12 v18 h-302 z"/>
  <text class="pname" x="365" y="116">Server</text>
  <rect class="smbox" x="365" y="172" width="68" height="40" rx="8"/>
  <text class="smt" x="399" y="196" text-anchor="middle">clients</text>
  <path class="arr" d="M433 192 H476" marker-end="url(#ar)"/>
  <text class="arrlbl" x="455" y="184" text-anchor="middle">dtlv://</text>
  <rect class="bound" x="480" y="160" width="158" height="64" rx="10"/>
  <text class="bnd-lbl" x="492" y="176">server</text>
  <path class="cyl-b" d="M544 190 L544 210 A16 5 0 0 0 576 210 L576 190 Z"/>
  <ellipse class="cyl-t" cx="560" cy="190" rx="16" ry="5"/>
  <text class="cyl-l" x="560" y="204" text-anchor="middle">DB</text>
  <text class="note" x="365" y="262">remote clients &#183; RBAC</text>
  <text class="note" x="365" y="280">network latency</text>

  <!-- Card 3: Async read replica -->
  <rect class="panel" x="672" y="92" width="302" height="212" rx="12"/>
  <path class="phead" d="M672 104 a12 12 0 0 1 12 -12 h278 a12 12 0 0 1 12 12 v18 h-302 z"/>
  <text class="pname" x="688" y="116">Async read replica</text>
  <rect class="smbox" x="698" y="128" width="52" height="24" rx="7"/>
  <text class="smt" x="724" y="145" text-anchor="middle">client</text>
  <path class="arr" d="M724 152 V169" marker-end="url(#ar)"/>
  <text class="arrlbl" x="744" y="165" text-anchor="start">writes</text>
  <rect class="smbox" x="888" y="128" width="56" height="24" rx="7"/>
  <text class="smt" x="916" y="145" text-anchor="middle">clients</text>
  <path class="arr" d="M916 152 V169" marker-end="url(#ar)"/>
  <text class="arrlbl" x="888" y="165" text-anchor="end">reads</text>
  <path class="cyl-b" d="M708 178 L708 198 A16 5 0 0 0 740 198 L740 178 Z"/>
  <ellipse class="cyl-t" cx="724" cy="178" rx="16" ry="5"/>
  <text class="cyl-l" x="724" y="192" text-anchor="middle">DB</text>
  <text class="nodelbl" x="724" y="222" text-anchor="middle">primary</text>
  <path class="arr" d="M744 188 H892" marker-end="url(#ar)"/>
  <text class="arrlbl" x="818" y="180" text-anchor="middle">WAL</text>
  <path class="cyl-b" d="M900 178 L900 198 A16 5 0 0 0 932 198 L932 178 Z"/>
  <ellipse class="cyl-t" cx="916" cy="178" rx="16" ry="5"/>
  <text class="cyl-l" x="916" y="192" text-anchor="middle">DB</text>
  <text class="nodelbl" x="916" y="222" text-anchor="middle">read-only</text>
  <text class="note" x="688" y="262">read scaling / isolation</text>
  <text class="note" x="688" y="280">eventually consistent</text>

  <!-- ================= Row 2 ================= -->
  <!-- Card 4: Consensus-lease HA -->
  <rect class="panel" x="26" y="326" width="302" height="212" rx="12"/>
  <path class="phead" d="M26 338 a12 12 0 0 1 12 -12 h278 a12 12 0 0 1 12 12 v18 h-302 z"/>
  <text class="pname" x="42" y="350">Consensus-lease HA</text>
  <rect class="smbox" x="34" y="372" width="48" height="24" rx="7"/>
  <text class="smt" x="58" y="389" text-anchor="middle">client</text>
  <path class="arr" d="M82 388 H159" marker-end="url(#ar)"/>
  <text class="arrlbl" x="100" y="381" text-anchor="start">writes</text>
  <rect class="smbox" x="270" y="372" width="50" height="24" rx="7"/>
  <text class="smt" x="295" y="389" text-anchor="middle">clients</text>
  <path class="arr" d="M293 396 L258 436" marker-end="url(#ar)"/>
  <text class="arrlbl" x="300" y="416" text-anchor="start">reads</text>
  <text class="nodelbl" x="177" y="378" text-anchor="middle">leader</text>
  <path class="cyl-b" d="M161 384 L161 404 A16 5 0 0 0 193 404 L193 384 Z"/>
  <ellipse class="cyl-t" cx="177" cy="384" rx="16" ry="5"/>
  <text class="cyl-l" x="177" y="398" text-anchor="middle">DB</text>
  <path class="arr" d="M168 408 L120 438"/>
  <path class="arr" d="M186 408 L234 438"/>
  <path class="arr" d="M116 452 H238"/>
  <text class="arrlbl" x="177" y="430" text-anchor="middle">Raft</text>
  <path class="cyl-b" d="M88 442 L88 460 A14 4 0 0 0 116 460 L116 442 Z"/>
  <ellipse class="cyl-t" cx="102" cy="442" rx="14" ry="4"/>
  <text class="cyl-l" x="102" y="455" text-anchor="middle">DB</text>
  <text class="nodelbl" x="102" y="478" text-anchor="middle">follower</text>
  <path class="cyl-b" d="M238 442 L238 460 A14 4 0 0 0 266 460 L266 442 Z"/>
  <ellipse class="cyl-t" cx="252" cy="442" rx="14" ry="4"/>
  <text class="cyl-l" x="252" y="455" text-anchor="middle">DB</text>
  <text class="nodelbl" x="252" y="478" text-anchor="middle">follower</text>
  <text class="note" x="42" y="500">auto failover &#183; quorum, fencing</text>

  <!-- Card 5: MCP -->
  <rect class="panel" x="349" y="326" width="302" height="212" rx="12"/>
  <path class="phead" d="M349 338 a12 12 0 0 1 12 -12 h278 a12 12 0 0 1 12 12 v18 h-302 z"/>
  <text class="pname" x="365" y="350">MCP</text>
  <rect class="smbox" x="365" y="404" width="70" height="40" rx="8"/>
  <text class="smt" x="400" y="428" text-anchor="middle">AI tool</text>
  <path class="arr" d="M435 424 H476" marker-end="url(#ar)"/>
  <text class="arrlbl" x="455" y="417" text-anchor="middle">tool</text>
  <text class="arrlbl" x="455" y="439" text-anchor="middle">call</text>
  <rect class="bound" x="480" y="392" width="158" height="64" rx="10"/>
  <text class="bnd-lbl" x="492" y="408">MCP</text>
  <rect class="badge" x="556" y="398" width="74" height="16" rx="8"/>
  <text class="badget" x="593" y="410" text-anchor="middle">writes off</text>
  <path class="cyl-b" d="M544 426 L544 444 A16 5 0 0 0 576 444 L576 426 Z"/>
  <ellipse class="cyl-t" cx="560" cy="426" rx="16" ry="5"/>
  <text class="cyl-l" x="560" y="439" text-anchor="middle">DB</text>
  <text class="note" x="365" y="496">controlled AI access &#183; writes opt-in</text>

  <!-- Card 6: Babashka pod -->
  <rect class="panel" x="672" y="326" width="302" height="212" rx="12"/>
  <path class="phead" d="M672 338 a12 12 0 0 1 12 -12 h278 a12 12 0 0 1 12 12 v18 h-302 z"/>
  <text class="pname" x="688" y="350">Babashka pod</text>
  <rect class="smbox" x="690" y="404" width="74" height="40" rx="8"/>
  <text class="smt" x="727" y="428" text-anchor="middle">script</text>
  <path class="arr" d="M764 424 H806" marker-end="url(#ar)"/>
  <text class="arrlbl" x="785" y="416" text-anchor="middle">IPC</text>
  <rect class="bound" x="810" y="392" width="150" height="64" rx="10"/>
  <text class="bnd-lbl" x="822" y="408">pod</text>
  <path class="cyl-b" d="M874 426 L874 444 A16 5 0 0 0 906 444 L906 426 Z"/>
  <ellipse class="cyl-t" cx="890" cy="426" rx="16" ry="5"/>
  <text class="cyl-l" x="890" y="439" text-anchor="middle">DB</text>
  <text class="note" x="688" y="496">scripts &#183; IPC, not zero-copy</text>
</svg>
