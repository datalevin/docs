<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
  <title id="title">Many-to-many: cardinality-many refs versus join entities</title>
  <desc id="desc">Two ways to model a many-to-many relationship between users and roles. On the left, a cardinality-many ref: user u-1 has a user/roles attribute holding role/admin and role/editor. It is convenient and pulls as a clean nested list, but each member is still a separate datom in the indexes, the relationship cannot carry its own attributes, and a very large set, such as millions of members, becomes costly. On the right, a join entity: two role-assignment entities each link user u-1 to one role via role-assignment/user and role-assignment/role. This produces normalized relationship facts the optimizer can count, join, and filter, it scales to huge relationships, and the join entity can carry edge attributes such as assigned-at, validity, rank, or source. Prefer the join entity when the relationship is large or has its own attributes.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .lhead { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; }
      .rhead { fill: #ccfbf1; stroke: #0f766e; stroke-width: 2; }
      .lpanel { fill: #fcfdfe; stroke: #fcd34d; stroke-width: 1.6; }
      .rpanel { fill: #fcfdfe; stroke: #5eead4; stroke-width: 1.6; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .rolenode { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8; }
      .joinnode { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2; }
      .edge { fill: none; stroke: #64748b; stroke-width: 1.8; }
      .elbl { fill: #475569; font-family: "IBM Plex Mono", ui-mono, Menlo, monospace; font-size: 10px; font-weight: 500; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 27px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 450; }
      .lh { fill: #b45309; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 720; }
      .rh { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 720; }
      .nt { fill: #0f172a; font-family: "IBM Plex Mono", ui-mono, Menlo, monospace; font-size: 12px; font-weight: 600; }
      .jt { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; }
      .jk { fill: #475569; font-family: "IBM Plex Mono", ui-mono, Menlo, monospace; font-size: 9.5px; font-weight: 500; }
      .pro { fill: #15803d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 500; }
      .con { fill: #b45309; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 500; }
      .mk-pro { fill: #16a34a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 700; }
      .mk-con { fill: #d97706; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 700; }
      .divider { fill: none; stroke: #cbd5e1; stroke-width: 1.6; stroke-dasharray: 2 6; }
    </style>
    <marker id="a" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="card" x="2" y="2" width="996" height="466" rx="18" stroke="#e2e8f0" stroke-width="2"/>
  <text class="title" x="500" y="40" text-anchor="middle">Many-to-Many: Two Models</text>
  <text class="caption" x="500" y="66" text-anchor="middle">Users and roles, modeled with a cardinality-many ref or with join entities.</text>

  <path class="divider" d="M500 92 V414"/>

  <!-- ================= LEFT: cardinality-many ref ================= -->
  <rect class="lhead" x="30" y="92" width="440" height="42" rx="11"/>
  <text class="lh" x="250" y="119" text-anchor="middle">:db.cardinality/many ref</text>

  <rect class="node" x="60" y="166" width="150" height="74" rx="10"/>
  <text class="nt" x="76" y="192">u-1</text>
  <text class="jk" x="76" y="212">:user/roles</text>
  <text class="jk" x="76" y="228">(many)</text>

  <rect class="rolenode" x="320" y="158" width="120" height="34" rx="9"/>
  <text class="nt" x="380" y="180" text-anchor="middle">:role/admin</text>
  <rect class="rolenode" x="320" y="212" width="120" height="34" rx="9"/>
  <text class="nt" x="380" y="234" text-anchor="middle">:role/editor</text>

  <path class="edge" d="M210 192 L316 175" marker-end="url(#a)"/>
  <path class="edge" d="M210 214 L316 229" marker-end="url(#a)"/>

  <text class="mk-pro" x="46" y="286">&#10003;</text>
  <text class="pro" x="62" y="286">convenient; pulls as one nested list</text>
  <text class="mk-con" x="46" y="312">!</text>
  <text class="con" x="62" y="312">each member is still a separate datom</text>
  <text class="mk-con" x="46" y="336">!</text>
  <text class="con" x="62" y="336">the relationship can't carry attributes</text>
  <text class="mk-con" x="46" y="360">!</text>
  <text class="con" x="62" y="360">a huge set (millions) gets costly</text>

  <!-- ================= RIGHT: join entity ================= -->
  <rect class="rhead" x="530" y="92" width="440" height="42" rx="11"/>
  <text class="rh" x="750" y="119" text-anchor="middle">Join entity</text>

  <rect class="node" x="546" y="182" width="96" height="40" rx="10"/>
  <text class="nt" x="594" y="207" text-anchor="middle">u-1</text>

  <rect class="joinnode" x="690" y="150" width="140" height="48" rx="9"/>
  <text class="jt" x="700" y="168">role-assignment</text>
  <text class="jk" x="700" y="188">user u-1 &#183; role admin</text>
  <rect class="joinnode" x="690" y="206" width="140" height="48" rx="9"/>
  <text class="jt" x="700" y="224">role-assignment</text>
  <text class="jk" x="700" y="244">user u-1 &#183; role editor</text>

  <rect class="rolenode" x="876" y="156" width="86" height="34" rx="9"/>
  <text class="nt" x="919" y="178" text-anchor="middle">admin</text>
  <rect class="rolenode" x="876" y="214" width="86" height="34" rx="9"/>
  <text class="nt" x="919" y="236" text-anchor="middle">editor</text>

  <path class="edge" d="M642 196 L686 180" marker-end="url(#a)"/>
  <path class="edge" d="M642 206 L686 224" marker-end="url(#a)"/>
  <path class="edge" d="M830 174 L872 173" marker-end="url(#a)"/>
  <path class="edge" d="M830 230 L872 231" marker-end="url(#a)"/>
  <text class="elbl" x="664" y="174" text-anchor="middle">/user</text>
  <text class="elbl" x="852" y="160" text-anchor="middle">/role</text>

  <text class="mk-pro" x="546" y="286">&#10003;</text>
  <text class="pro" x="562" y="286">normalized facts to count, join, filter</text>
  <text class="mk-pro" x="546" y="312">&#10003;</text>
  <text class="pro" x="562" y="312">scales to very large relationships</text>
  <text class="mk-pro" x="546" y="336">&#10003;</text>
  <text class="pro" x="562" y="336">edge can carry attributes:</text>
  <text class="jk" x="562" y="356">assigned-at &#183; validity &#183; rank &#183; source</text>

  <!-- ===== bottom guidance ===== -->
  <text class="caption" x="500" y="442" text-anchor="middle" style="font-size:13px">Prefer a join entity when the relationship is large or has its own attributes.</text>
</svg>
