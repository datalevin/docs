<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Left-deep join tree</title>
  <desc id="desc">The good plan for finding expensive products in one order, drawn as a left-deep join tree. Joins are shown as bowtie nodes and base relations as leaf boxes. The deepest join combines the order leaf, accessed by an AVE lookup on order/id returning one order, with the line-item leaf reached through line-item/order, producing twelve line items. That intermediate result of twelve rows is then joined with the product leaf, reached through line-item/product and filtered by price greater than 10000, producing a few rows at the root. In a left-deep tree every right child is a base relation and the left branch is the growing intermediate result. A small grayed inset shows a bushy tree, where two independently built intermediates are joined; Datalevin does not use bushy plans.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .leaf { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .node { fill: #0f766e; }
      .edge { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .bow { fill: #ffffff; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 30px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 450; }
      .leaf-t { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 20px; font-weight: 700; }
      .leaf-d { fill: #334155; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 14px; font-weight: 450; }
      .size { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 17px; font-weight: 700; }
      .root-out { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; }
      .legend { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 450; }
      .legb { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 650; }
      .ins-frame { fill: #fbfcfd; stroke: #cbd5e1; stroke-width: 1.6; stroke-dasharray: 5 5; }
      .ins-label { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 700; }
      .ins-node { fill: #94a3b8; }
      .ins-leaf { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.6; }
      .ins-leaf-t { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; }
      .ins-edge { fill: none; stroke: #cbd5e1; stroke-width: 1.8; }
    </style>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="496" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="44" text-anchor="middle">Left-Deep Join Tree</text>
  <text class="caption" x="500" y="72" text-anchor="middle">The good plan for "expensive products in one order" — each join adds one base relation.</text>

  <!-- ===== Edges (drawn first, under nodes) ===== -->
  <path class="edge" d="M320 120 L230 232"/>
  <path class="edge" d="M320 120 L500 206"/>
  <path class="edge" d="M230 232 L159 352"/>
  <path class="edge" d="M230 232 L401 352"/>

  <!-- ===== Leaf: product (right child of root) ===== -->
  <rect class="leaf" x="452" y="168" width="216" height="80" rx="12"/>
  <text class="leaf-t" x="470" y="196">product</text>
  <text class="leaf-d" x="470" y="219">:line-item/product</text>
  <text class="leaf-d" x="470" y="239">price &gt; 10000</text>

  <!-- ===== Leaf: order ===== -->
  <rect class="leaf" x="64" y="352" width="190" height="62" rx="12"/>
  <text class="leaf-t" x="82" y="379">order</text>
  <text class="leaf-d" x="82" y="401">AVE :order/id &#8594; 1</text>

  <!-- ===== Leaf: line-item ===== -->
  <rect class="leaf" x="296" y="352" width="220" height="62" rx="12"/>
  <text class="leaf-t" x="314" y="379">line-item</text>
  <text class="leaf-d" x="314" y="401">:line-item/order &#8594; 12</text>

  <!-- ===== Join node N1 (order * line-item) ===== -->
  <circle class="node" cx="230" cy="232" r="24"/>
  <path class="bow" d="M216 221 L230 232 L216 243 Z"/>
  <path class="bow" d="M244 221 L230 232 L244 243 Z"/>

  <!-- ===== Join node N2 (root) ===== -->
  <circle class="node" cx="320" cy="120" r="24"/>
  <path class="bow" d="M306 109 L320 120 L306 131 Z"/>
  <path class="bow" d="M334 109 L320 120 L334 131 Z"/>

  <!-- ===== Size annotations ===== -->
  <text class="size" x="296" y="182" text-anchor="start">12 rows</text>
  <text class="root-out" x="356" y="106" text-anchor="start">&#8594; a few rows</text>

  <!-- ===== Legend ===== -->
  <circle class="node" cx="78" cy="450" r="11"/>
  <path class="bow" d="M71 444 L78 450 L71 456 Z"/>
  <path class="bow" d="M85 444 L78 450 L85 456 Z"/>
  <text class="legb" x="96" y="455">join</text>
  <rect class="leaf" x="170" y="439" width="22" height="22" rx="5"/>
  <text class="legb" x="200" y="455">base relation (leaf)</text>
  <text class="legend" x="360" y="455">Left-deep: every right child is a base relation; the left branch grows the intermediate.</text>

  <!-- ===== Inset: bushy tree (not used) ===== -->
  <rect class="ins-frame" x="712" y="150" width="250" height="215" rx="12"/>
  <text class="ins-label" x="837" y="178" text-anchor="middle">Bushy &#8212; not used</text>

  <path class="ins-edge" d="M837 205 L792 258"/>
  <path class="ins-edge" d="M837 205 L882 258"/>
  <path class="ins-edge" d="M792 258 L756 318"/>
  <path class="ins-edge" d="M792 258 L820 318"/>
  <path class="ins-edge" d="M882 258 L854 318"/>
  <path class="ins-edge" d="M882 258 L918 318"/>

  <rect class="ins-leaf" x="734" y="318" width="44" height="28" rx="6"/>
  <text class="ins-leaf-t" x="756" y="336" text-anchor="middle">R1</text>
  <rect class="ins-leaf" x="798" y="318" width="44" height="28" rx="6"/>
  <text class="ins-leaf-t" x="820" y="336" text-anchor="middle">R2</text>
  <rect class="ins-leaf" x="832" y="318" width="44" height="28" rx="6"/>
  <text class="ins-leaf-t" x="854" y="336" text-anchor="middle">R3</text>
  <rect class="ins-leaf" x="896" y="318" width="44" height="28" rx="6"/>
  <text class="ins-leaf-t" x="918" y="336" text-anchor="middle">R4</text>

  <circle class="ins-node" cx="837" cy="205" r="13"/>
  <path class="bow" d="M830 200 L837 205 L830 210 Z"/>
  <path class="bow" d="M844 200 L837 205 L844 210 Z"/>
  <circle class="ins-node" cx="792" cy="258" r="13"/>
  <path class="bow" d="M785 253 L792 258 L785 263 Z"/>
  <path class="bow" d="M799 253 L792 258 L799 263 Z"/>
  <circle class="ins-node" cx="882" cy="258" r="13"/>
  <path class="bow" d="M875 253 L882 258 L875 263 Z"/>
  <path class="bow" d="M889 253 L882 258 L889 263 Z"/>
</svg>
