<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid retrieval joins on the entity id</title>
  <desc id="desc">Four retrieval lenses run in one Datalog query: full-text search, vector similarity, document (idoc) match, and ordinary Datalog clauses. Each returns datoms keyed by the same entity id, ?e. The engine joins them by intersecting those entity-id sets, then produces ranked and filtered results. It is one query on one engine, with no fan-out to separate search services.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .lens { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .join { fill: #f0fdfa; stroke: #0f766e; stroke-width: 3; }
      .output { fill: #ffffff; stroke: #0f766e; stroke-width: 2.5; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 32px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 450; }
      .box-title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 22px; font-weight: 680; }
      .join-title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 25px; font-weight: 700; }
      .sub { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 19px; font-weight: 450; }
      .fn { fill: #0891b2; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 19px; font-weight: 600; }
      .code { fill: #334155; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 20px; }
      .ekey { fill: #0f766e; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 20px; font-weight: 700; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="556" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="48" text-anchor="middle">Hybrid Retrieval</text>
  <text class="caption" x="500" y="80" text-anchor="middle">Every index returns datoms keyed by ?e — the engine joins them on that entity id.</text>

  <!-- ===== Retrieval lenses ===== -->
  <rect class="lens" x="43" y="118" width="215" height="150" rx="12"/>
  <text class="box-title" x="150" y="158" text-anchor="middle">Full-text</text>
  <text class="fn" x="150" y="190" text-anchor="middle">fulltext</text>
  <text class="code" x="150" y="234" text-anchor="middle">[<tspan class="ekey">?e</tspan> a v score]</text>

  <rect class="lens" x="276" y="118" width="215" height="150" rx="12"/>
  <text class="box-title" x="383" y="158" text-anchor="middle">Vector</text>
  <text class="fn" x="383" y="190" text-anchor="middle">vec-neighbors</text>
  <text class="code" x="383" y="234" text-anchor="middle">[<tspan class="ekey">?e</tspan> a v dist]</text>

  <rect class="lens" x="509" y="118" width="215" height="150" rx="12"/>
  <text class="box-title" x="616" y="158" text-anchor="middle">Document</text>
  <text class="fn" x="616" y="190" text-anchor="middle">idoc-match</text>
  <text class="code" x="616" y="234" text-anchor="middle">[<tspan class="ekey">?e</tspan> a v]</text>

  <rect class="lens" x="742" y="118" width="215" height="150" rx="12"/>
  <text class="box-title" x="849" y="158" text-anchor="middle">Datalog</text>
  <text class="fn" x="849" y="190" text-anchor="middle">:where clauses</text>
  <text class="code" x="849" y="234" text-anchor="middle">[<tspan class="ekey">?e</tspan> a v]</text>

  <!-- ===== Fan-in to the join ===== -->
  <path class="line" d="M150 268 L360 318" marker-end="url(#arrow)"/>
  <path class="line" d="M383 268 L455 318" marker-end="url(#arrow)"/>
  <path class="line" d="M616 268 L545 318" marker-end="url(#arrow)"/>
  <path class="line" d="M849 268 L640 318" marker-end="url(#arrow)"/>

  <!-- ===== Join on entity id ===== -->
  <rect class="join" x="300" y="320" width="400" height="88" rx="14"/>
  <text class="join-title" x="500" y="358" text-anchor="middle">Join on the shared <tspan class="ekey" font-size="25">?e</tspan></text>
  <text class="sub" x="500" y="388" text-anchor="middle">intersection of the candidate entity-id sets</text>

  <path class="line" d="M500 408 V440" marker-end="url(#arrow)"/>

  <!-- ===== Output ===== -->
  <rect class="output" x="350" y="442" width="300" height="74" rx="14"/>
  <text class="box-title" x="500" y="476" text-anchor="middle">Ranked, fused results</text>
  <text class="sub" x="500" y="500" text-anchor="middle">filter · reciprocal rank fusion</text>

  <text class="caption" x="500" y="546" text-anchor="middle">One query, one engine — no fan-out to separate search services.</text>
</svg>
