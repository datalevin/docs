<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="514" viewBox="0 0 1000 514" role="img" aria-labelledby="title desc">
  <title id="title">Refs as directed edges with forward and reverse navigation</title>
  <desc id="desc">Four user entities are nodes connected by :user/follows reference edges, which are directed: alice follows bob, cara follows bob, and bob follows dave. The arrows point in the stored direction. Forward navigation starts from a known subject and follows the edge to its object: with bob's entity id known, [bob-eid :user/follows ?other] reaches dave, using the EAV index. Reverse navigation starts from a known object placed in the value position and finds the subjects that point to it: with bob's entity id known, [?other :user/follows bob-eid] finds alice and cara, using the AVE index. Both directions are equally fast because every attribute is indexed. In pull and entity navigation, the reverse attribute :user/_follows expresses the same reverse traversal.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .pivot { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.8; }
      .efwd { fill: none; stroke: #0f766e; stroke-width: 2.8; }
      .erev { fill: none; stroke: #0891b2; stroke-width: 2.8; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 29px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 17px; font-weight: 450; }
      .nodet { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 650; }
      .pivott { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 720; }
      .elbl-f { fill: #0f766e; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11.5px; font-weight: 500; }
      .elbl-r { fill: #0891b2; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11.5px; font-weight: 500; }
      .cbox-f { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2; }
      .cbox-r { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .ct-f { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 720; }
      .ct-r { fill: #0e7490; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 720; }
      .cmono { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 500; }
      .cdesc { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12.5px; font-weight: 450; }
      .cnote { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-style: italic; font-weight: 450; }
    </style>
    <marker id="af" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0f766e" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#0891b2" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="510" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="44" text-anchor="middle">Refs as Directed Edges</text>
  <text class="caption" x="500" y="72" text-anchor="middle">Every :db.type/ref is one directed edge — forward scans EAV, reverse scans AVE.</text>

  <!-- ===== Edges (under nodes) ===== -->
  <path class="erev" d="M272 172 L420 248" marker-end="url(#ar)"/>
  <path class="erev" d="M272 350 L420 280" marker-end="url(#ar)"/>
  <path class="efwd" d="M538 264 L716 264" marker-end="url(#af)"/>

  <text class="elbl-r" x="330" y="192" transform="rotate(27 330 192)">:user/follows</text>
  <text class="elbl-r" x="312" y="322" transform="rotate(-25 312 322)">:user/follows</text>
  <text class="elbl-f" x="627" y="254" text-anchor="middle">:user/follows</text>

  <!-- ===== Nodes ===== -->
  <rect class="node" x="160" y="146" width="112" height="46" rx="23"/>
  <text class="nodet" x="216" y="175" text-anchor="middle">alice</text>

  <rect class="node" x="160" y="334" width="112" height="46" rx="23"/>
  <text class="nodet" x="216" y="363" text-anchor="middle">cara</text>

  <rect class="pivot" x="424" y="241" width="112" height="46" rx="23"/>
  <text class="pivott" x="480" y="270" text-anchor="middle">bob</text>

  <rect class="node" x="716" y="241" width="112" height="46" rx="23"/>
  <text class="nodet" x="772" y="270" text-anchor="middle">dave</text>

  <!-- ===== Forward callout ===== -->
  <rect class="cbox-f" x="520" y="406" width="440" height="80" rx="12"/>
  <text class="ct-f" x="540" y="434">Forward &#183; subject known &#8594; EAV</text>
  <text class="cmono" x="540" y="459">[bob-eid :user/follows ?other]</text>
  <text class="cdesc" x="540" y="479">bob known &#8594; object dave</text>

  <!-- ===== Reverse callout ===== -->
  <rect class="cbox-r" x="40" y="406" width="440" height="80" rx="12"/>
  <text class="ct-r" x="60" y="434">Reverse &#183; object known &#8594; AVE</text>
  <text class="cmono" x="60" y="459">[?other :user/follows bob-eid]</text>
  <text class="cdesc" x="60" y="479">bob known &#8594; subjects {alice, cara}</text>
</svg>
