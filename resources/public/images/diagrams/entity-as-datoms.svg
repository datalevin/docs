<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">One entity as many datoms</title>
  <desc id="desc">A row or document pictured as one rigid box of fields for record 101 is really stored as a set of separate datoms. Entity 101 equals the datoms that share that entity id: name, email, and language under the user namespace, plus customer and employee attributes on the same id. Adding a fact means adding a datom, with no row to rewrite and no schema to alter.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .core { fill: #f8fafc; stroke: #0f766e; stroke-width: 3; }
      .soft { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .muted-box { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 7 6; }
      .badge { fill: #0f766e; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 32px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 450; }
      .muted-head { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 21px; font-weight: 680; }
      .muted-field { fill: #64748b; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 21px; }
      .muted-note { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 20px; font-weight: 500; }
      .panel-head { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 22px; font-weight: 680; }
      .badge-label { fill: #ffffff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 22px; font-weight: 600; }
      .badge-id { fill: #ffffff; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 30px; font-weight: 700; }
      .eq { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 40px; font-weight: 700; }
      .code { fill: #0f172a; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 21px; }
      .ekey { fill: #0f766e; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 21px; font-weight: 700; }
      .note { fill: #0891b2; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 20px; font-weight: 600; }
      .arrow-label { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 20px; font-weight: 600; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="596" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="48" text-anchor="middle">One Entity, Many Datoms</text>
  <text class="caption" x="500" y="80" text-anchor="middle">An entity is not a row or document — it is just the datoms that share an id.</text>

  <!-- ===== The container you might picture (muted) ===== -->
  <rect class="muted-box" x="378" y="104" width="244" height="124" rx="10"/>
  <text class="muted-head" x="500" y="132" text-anchor="middle">Row / document #101</text>
  <line class="line" x1="396" y1="144" x2="604" y2="144" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="muted-field" x="400" y="172">name   Alice</text>
  <text class="muted-field" x="400" y="198">email  alice@ex.io</text>
  <text class="muted-field" x="400" y="224">lang   en</text>
  <text class="muted-note" x="500" y="250" text-anchor="middle">one rigid box of fields</text>

  <path class="line" d="M500 262 V296" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="516" y="284" text-anchor="start">stored as datoms</text>

  <!-- ===== The real model: entity = its datoms ===== -->
  <rect class="core" x="120" y="304" width="760" height="232" rx="14"/>
  <text class="panel-head" x="500" y="336" text-anchor="middle">Each fact is a separate datom, keyed by the shared id</text>

  <rect class="badge" x="150" y="360" width="140" height="120" rx="12"/>
  <text class="badge-label" x="220" y="406" text-anchor="middle">Entity</text>
  <text class="badge-id" x="220" y="444" text-anchor="middle">101</text>

  <text class="eq" x="318" y="434" text-anchor="middle">=</text>

  <rect class="soft" x="348" y="356" width="506" height="128" rx="10"/>
  <text class="code" x="370" y="382">[<tspan class="ekey">101</tspan> :user/name "Alice"]</text>
  <text class="code" x="370" y="406">[<tspan class="ekey">101</tspan> :user/email "alice@ex.io"]</text>
  <text class="code" x="370" y="430">[<tspan class="ekey">101</tspan> :user/lang "en"]</text>
  <text class="code" x="370" y="454">[<tspan class="ekey">101</tspan> :customer/tier :gold]</text>
  <text class="code" x="370" y="478">[<tspan class="ekey">101</tspan> :employee/team :platform]</text>

  <text class="note" x="500" y="516" text-anchor="middle">same id · attributes from :user, :customer, :employee on one entity</text>

  <text class="caption" x="500" y="570" text-anchor="middle">Add a fact by adding a datom — no row to rewrite, no schema to alter.</text>
</svg>
