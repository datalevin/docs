<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">Attribute schema control spectrum</title>
  <desc id="desc">Datalevin schema controls form a spectrum, not a required lifecycle. On the left, an undeclared attribute can be written immediately; Datalevin adds it automatically and stores values with generic EDN encoding. In the middle, declaring attribute behavior such as db valueType, cardinality, and uniqueness gives typed encoding, range and sorted queries, references, upsert, and compact storage. On the right, optional attribute capabilities such as fulltext, embedding, idoc, and vec add search indexes. Connection-wide options such as validate data and closed schema add write-time enforcement. The controls move from flexible and implicit to more declared behavior.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 28px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 450; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; }
      .box1 { fill: #f8fafc; stroke: #94a3b8; }
      .box2 { fill: #ecfeff; stroke: #0891b2; }
      .box3 { fill: #f0fdfa; stroke: #0f766e; }
      .head { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 16px; font-weight: 720; }
      .body { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12.5px; font-weight: 450; }
      .code { fill: #0f172a; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px; font-weight: 550; }
      .tag { fill: #0f766e; font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11.5px; font-weight: 600; }
      .axis { fill: none; stroke: #64748b; stroke-width: 2.2; }
      .axislabel { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12.5px; font-weight: 700; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bg" x="2" y="2" width="996" height="356" rx="10"/>
  <text class="title" x="500" y="42" text-anchor="middle">Attribute Schema Control Spectrum</text>
  <text class="caption" x="500" y="68" text-anchor="middle">Use each attribute with as much declared behavior as the application needs.</text>

  <rect class="box box1" x="36" y="102" width="286" height="156" rx="8"/>
  <text class="head" x="62" y="134">Flexible by default</text>
  <text class="code" x="62" y="164">{:user/name "Alice"}</text>
  <text class="body" x="62" y="194">No prior declaration required</text>
  <text class="body" x="62" y="216">Attribute is added automatically</text>
  <text class="body" x="62" y="238">Generic EDN encoding; equality lookup</text>

  <rect class="box box2" x="357" y="102" width="286" height="156" rx="8"/>
  <text class="head" x="383" y="134">Declare attribute behavior</text>
  <text class="tag" x="383" y="164">:db/valueType</text>
  <text class="tag" x="383" y="184">:db/cardinality  :db/unique</text>
  <text class="body" x="383" y="214">Typed encoding; range and sorted queries</text>
  <text class="body" x="383" y="236">References, upsert, compact storage</text>

  <rect class="box box3" x="678" y="102" width="286" height="156" rx="8"/>
  <text class="head" x="704" y="134">Add optional capabilities</text>
  <text class="tag" x="704" y="164">:db/fulltext  :db/embedding</text>
  <text class="tag" x="704" y="184">:db.type/idoc  :db.type/vec</text>
  <text class="body" x="704" y="212">Search and nested-value indexes</text>
  <text class="body" x="704" y="236">Connection options can enforce writes</text>

  <path class="axis" d="M56 304 H944" marker-end="url(#arrow)"/>
  <text class="axislabel" x="56" y="294" text-anchor="start">more flexible, less declared</text>
  <text class="axislabel" x="944" y="294" text-anchor="end">more declared behavior</text>
</svg>
