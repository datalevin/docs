<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="490" viewBox="0 0 1000 490" role="img" aria-labelledby="title desc">
  <title id="title">Truth maintenance: fact status lifecycle with preserved evidence</title>
  <desc id="desc">A fact moves through a status lifecycle while its evidence is preserved. A new observation is extracted into a candidate fact with status pending, for example the deployment window equals Thursday. The candidate is accepted after a Datalog validation check and becomes the current fact with status current and confidence 0.9. When newer evidence arrives, the current fact records a fact/supersedes link to the older fact, which moves to status superseded; for example the older window-equals-Tuesday fact with confidence 0.8 becomes superseded. Below the lifecycle is the observations store: episodes such as Alice setting the window to Tuesday on 06-08 and moving it to Thursday on 06-09. These episodes are immutable evidence, preserved even after the fact is superseded. The candidate fact is extracted from an observation, and the current and superseded facts keep a fact/source-episode link back to the evidence.</desc>
  <defs>
    <style>
      .card { fill: #ffffff; }
      .box-obs { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .box-pend { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2.5; }
      .box-cur { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.5; }
      .box-sup { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2.5; stroke-dasharray: 6 5; }
      .ul-obs { stroke: #a5d8e6; stroke-width: 2; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2.6; }
      .evi { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 2 7; stroke-linecap: round; }
      .title { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 30px; font-weight: 720; }
      .caption { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 19px; font-weight: 450; }
      .h-obs { fill: #0e7490; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 22px; font-weight: 720; }
      .h-pend { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; }
      .h-cur { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; }
      .h-sup { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; }
      .sub { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 500; }
      .val { fill: #0f172a; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 15px; font-weight: 450; }
      .val-mut { fill: #94a3b8; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 15px; font-weight: 450; }
      .meta { fill: #64748b; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 450; }
      .item { fill: #334155; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 15px; font-weight: 450; }
      .alabel { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; font-weight: 650; }
      .alabel-m { fill: #475569; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 450; }
      .asub { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 450; }
      .pill-pend { fill: #e2e8f0; }
      .pill-cur { fill: #ccfbf1; }
      .pill-sup { fill: #f1f5f9; }
      .pt-pend { fill: #475569; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; }
      .pt-cur { fill: #0f766e; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; }
      .pt-sup { fill: #94a3b8; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 13px; font-weight: 600; }
      .mark-obs { fill: #0891b2; }
      .strike { stroke: #94a3b8; stroke-width: 1.6; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowl" viewBox="0 0 12 12" refX="9.5" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Figure card (transparent corners adapt to light/dark page) -->
  <rect class="card" x="2" y="2" width="996" height="486" rx="18" stroke="#e2e8f0" stroke-width="2"/>

  <text class="title" x="500" y="44" text-anchor="middle">Truth Maintenance</text>
  <text class="caption" x="500" y="74" text-anchor="middle">A fact moves pending &#8594; current &#8594; superseded while its evidence is preserved.</text>

  <!-- ===== Horizontal status flow ===== -->
  <path class="flow" d="M260 170 H390" marker-end="url(#arrow)"/>
  <text class="alabel" x="325" y="156" text-anchor="middle">accept</text>
  <text class="asub" x="325" y="190" text-anchor="middle">Datalog check</text>

  <path class="flow" d="M610 170 H740" marker-end="url(#arrow)"/>
  <text class="alabel-m" x="675" y="155" text-anchor="middle">:fact/supersedes</text>
  <text class="asub" x="675" y="190" text-anchor="middle">newer evidence wins</text>

  <!-- ===== Candidate fact (pending) ===== -->
  <rect class="box-pend" x="40" y="100" width="220" height="140" rx="14"/>
  <text class="h-pend" x="62" y="132">Candidate fact</text>
  <rect class="pill-pend" x="62" y="146" width="78" height="24" rx="12"/>
  <text class="pt-pend" x="101" y="163" text-anchor="middle">:pending</text>
  <text class="val" x="62" y="200">window &#8594; Thursday</text>
  <text class="meta" x="62" y="223">from new episode</text>

  <!-- ===== Current fact (current) ===== -->
  <rect class="box-cur" x="390" y="100" width="220" height="140" rx="14"/>
  <text class="h-cur" x="412" y="132">Current fact</text>
  <rect class="pill-cur" x="412" y="146" width="78" height="24" rx="12"/>
  <text class="pt-cur" x="451" y="163" text-anchor="middle">:current</text>
  <text class="val" x="412" y="200">window &#8594; Thursday</text>
  <text class="meta" x="412" y="223">confidence 0.9</text>

  <!-- ===== Superseded fact (superseded) ===== -->
  <rect class="box-sup" x="740" y="100" width="220" height="140" rx="14"/>
  <text class="h-sup" x="762" y="132">Superseded fact</text>
  <rect class="pill-sup" x="762" y="146" width="102" height="24" rx="12"/>
  <text class="pt-sup" x="813" y="163" text-anchor="middle">:superseded</text>
  <text class="val-mut" x="762" y="200">window &#8594; Tuesday</text>
  <line class="strike" x1="762" y1="195" x2="902" y2="195"/>
  <text class="meta" x="762" y="223">confidence 0.8</text>

  <!-- ===== Vertical links to the evidence store ===== -->
  <path class="flow" d="M150 312 V240" marker-end="url(#arrow)"/>
  <text class="alabel" x="162" y="282" text-anchor="start">extract</text>

  <path class="evi" d="M500 240 V312" marker-end="url(#arrowl)"/>
  <text class="alabel-m" x="512" y="270" text-anchor="start">:fact/source-episode</text>
  <text class="asub" x="512" y="288" text-anchor="start">evidence link</text>

  <path class="evi" d="M850 240 V312" marker-end="url(#arrowl)"/>
  <text class="asub" x="862" y="279" text-anchor="start">evidence kept</text>

  <!-- ===== Observations / evidence store ===== -->
  <rect class="box-obs" x="40" y="312" width="920" height="140" rx="14"/>
  <text class="h-obs" x="64" y="344">Observations</text>
  <text class="sub" x="64" y="366">episodes &#8212; immutable evidence, preserved after supersession</text>
  <line class="ul-obs" x1="52" y1="380" x2="948" y2="380"/>
  <circle class="mark-obs" cx="68" cy="405" r="4.5"/>
  <text class="item" x="84" y="410">06-08 &#183; Alice: deployment window is Tuesday</text>
  <circle class="mark-obs" cx="68" cy="433" r="4.5"/>
  <text class="item" x="84" y="438">06-09 &#183; Alice: moved the window to Thursday</text>
</svg>
